<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Cuotas, límites y manejo de errores en storage</text>

  <!-- localStorage limits -->
  <rect x="20" y="54" width="360" height="180" fill="#1f2937" stroke="#ed8936" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#fed7aa">localStorage / sessionStorage</text>
  <text x="36" y="98" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// ❌ Sin manejo de errores</text>
  <text x="36" y="116" font-family="Courier,monospace" font-size="11" fill="#ef4444">localStorage.setItem('data', bigString);</text>
  <text x="36" y="136" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">→ Lanza DOMException: QuotaExceededError</text>
  <text x="36" y="158" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// ✅ Con manejo correcto</text>
  <text x="36" y="176" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const saveData = (key, value) =&gt; {</text>
  <text x="36" y="194" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  try {</text>
  <text x="36" y="212" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    localStorage.setItem(key, JSON.stringify(value));</text>
  <text x="36" y="230" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  } catch (e) {</text>

  <!-- IndexedDB limits -->
  <rect x="420" y="54" width="360" height="180" fill="#1f2937" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="436" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#fca5a5">IndexedDB</text>
  <text x="436" y="98" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Errores en transacciones IDB</text>
  <text x="436" y="116" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const addItem = (db, item) =&gt; {</text>
  <text x="436" y="134" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return new Promise((resolve, reject) =&gt; {</text>
  <text x="436" y="152" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const tx = db.transaction('items', 'readwrite');</text>
  <text x="436" y="170" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const req = tx.objectStore('items').add(item);</text>
  <text x="436" y="188" font-family="Courier,monospace" font-size="11" fill="#86efac">    req.onsuccess = () =&gt; resolve(req.result);</text>
  <text x="436" y="206" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    req.onerror = () =&gt; reject(req.error);</text>
  <text x="436" y="224" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  });</text>
  <text x="436" y="242" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <line x1="20" y1="252" x2="780" y2="252" stroke="#4a5568" stroke-width="1"/>

  <!-- Full error handler -->
  <text x="20" y="272" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Manejador con identificación de tipo de error</text>
  <rect x="20" y="284" width="370" height="150" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="304" font-family="Courier,monospace" font-size="11" fill="#a0aec0">  // Continuar del catch anterior...</text>
  <text x="34" y="322" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const name = e.name;</text>
  <text x="34" y="340" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    if (name === 'QuotaExceededError') {</text>
  <text x="34" y="358" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">      evictOldData();  // liberar espacio</text>
  <text x="34" y="376" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    } else if (name === 'SecurityError') {</text>
  <text x="34" y="394" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">      console.warn('Storage bloqueado en modo privado');</text>
  <text x="34" y="412" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    } else throw e;</text>
  <text x="34" y="430" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>

  <!-- Limits table -->
  <rect x="410" y="284" width="370" height="150" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="304" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Límites aproximados por storage</text>
  <text x="424" y="326" font-family="Courier,monospace" font-size="11" fill="#93c5fd">localStorage     </text>
  <text x="570" y="326" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">~5 MB (varía según browser)</text>
  <text x="424" y="346" font-family="Courier,monospace" font-size="11" fill="#86efac">sessionStorage   </text>
  <text x="570" y="346" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">~5 MB (varía según browser)</text>
  <text x="424" y="366" font-family="Courier,monospace" font-size="11" fill="#f0db4f">IndexedDB        </text>
  <text x="570" y="366" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">~50% del espacio disponible</text>
  <text x="424" y="388" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">navigator.storage.estimate() para consultar:</text>
  <text x="424" y="408" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const { quota, usage } =</text>
  <text x="424" y="426" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  await navigator.storage.estimate();</text>

  <text x="400" y="454" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 19</text>
</svg>