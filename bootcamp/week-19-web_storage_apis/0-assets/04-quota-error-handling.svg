<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Manejo de cuota y errores de storage</title>
  <desc id="desc">Flujo de manejo cuando falla escritura por límite de almacenamiento.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <text x="40" y="58" fill="#f0db4f" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Quota Error Handling</text>

  <rect x="40" y="98" width="1120" height="74" rx="10" fill="#111827" stroke="#334155"/>
  <text x="60" y="128" fill="#f0db4f" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Objetivo</text>
  <text x="60" y="152" fill="#e5e7eb" font-size="16" font-family="Inter, Roboto, sans-serif">Responder ante `QuotaExceededError` sin perder continuidad funcional.</text>

  <rect x="110" y="250" width="220" height="120" rx="10" fill="#111827" stroke="#4ade80"/>
  <text x="180" y="318" fill="#e5e7eb" font-size="18" font-family="Inter, Roboto, sans-serif">Intentar guardar</text>

  <rect x="390" y="250" width="220" height="120" rx="10" fill="#111827" stroke="#f97316"/>
  <text x="450" y="318" fill="#e5e7eb" font-size="18" font-family="Inter, Roboto, sans-serif">try/catch</text>

  <rect x="670" y="220" width="220" height="120" rx="10" fill="#111827" stroke="#60a5fa"/>
  <text x="718" y="292" fill="#e5e7eb" font-size="18" font-family="Inter, Roboto, sans-serif">Limpiar cache</text>

  <rect x="670" y="380" width="220" height="120" rx="10" fill="#111827" stroke="#ef4444"/>
  <text x="705" y="452" fill="#e5e7eb" font-size="18" font-family="Inter, Roboto, sans-serif">Fallback memoria</text>

  <rect x="950" y="300" width="160" height="120" rx="10" fill="#111827" stroke="#f0db4f"/>
  <text x="985" y="370" fill="#e5e7eb" font-size="18" font-family="Inter, Roboto, sans-serif">Notificar UX</text>

  <path d="M330 310 L390 310" stroke="#f0db4f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M610 290 L670 280" stroke="#f0db4f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M610 330 L670 440" stroke="#f0db4f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M890 280 L950 340" stroke="#f0db4f" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M890 440 L950 370" stroke="#f0db4f" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="40" y="584" width="1120" height="132" rx="10" fill="#111827" stroke="#334155"/>
  <text x="60" y="620" fill="#f0db4f" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Verificación</text>
  <text x="60" y="648" fill="#e5e7eb" font-size="16" font-family="Inter, Roboto, sans-serif">1) ¿Qué datos eliminar primero para recuperar espacio?</text>
  <text x="60" y="676" fill="#e5e7eb" font-size="16" font-family="Inter, Roboto, sans-serif">2) Define mensaje claro al usuario cuando no sea posible persistir.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#f0db4f"/>
    </marker>
  </defs>
</svg>
