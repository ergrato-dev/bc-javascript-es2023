<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">localStorage vs sessionStorage</text>

  <!-- Headers -->
  <rect x="20" y="50" width="360" height="40" fill="#1e3a5f" rx="6"/>
  <text x="200" y="76" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#93c5fd" text-anchor="middle">localStorage</text>
  <rect x="420" y="50" width="360" height="40" fill="#065f46" rx="6"/>
  <text x="600" y="76" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#86efac" text-anchor="middle">sessionStorage</text>

  <!-- Attributes table -->
  <text x="30" y="110" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#a0aec0">Persistencia</text>
  <text x="200" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">Permanente (hasta borrar)</text>
  <text x="600" y="110" font-family="system-ui,sans-serif" font-size="12" fill="#86efac" text-anchor="middle">Solo durante la pestaña/sesión</text>

  <line x1="20" y1="118" x2="780" y2="118" stroke="#2d3748" stroke-width="1"/>
  <text x="30" y="134" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#a0aec0">Ámbito</text>
  <text x="200" y="134" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">Todas las pestañas del origen</text>
  <text x="600" y="134" font-family="system-ui,sans-serif" font-size="12" fill="#86efac" text-anchor="middle">Solo la pestaña que lo creó</text>

  <line x1="20" y1="142" x2="780" y2="142" stroke="#2d3748" stroke-width="1"/>
  <text x="30" y="158" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#a0aec0">Límite</text>
  <text x="200" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">~5-10 MB</text>
  <text x="600" y="158" font-family="system-ui,sans-serif" font-size="12" fill="#86efac" text-anchor="middle">~5-10 MB</text>

  <line x1="20" y1="166" x2="780" y2="166" stroke="#2d3748" stroke-width="1"/>
  <text x="30" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#a0aec0">API</text>
  <text x="200" y="182" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">Idéntica</text>
  <text x="600" y="182" font-family="system-ui,sans-serif" font-size="12" fill="#86efac" text-anchor="middle">Idéntica</text>

  <line x1="20" y1="192" x2="780" y2="192" stroke="#4a5568" stroke-width="1"/>

  <!-- Code  -->
  <text x="20" y="214" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">API completa — misma interfaz para ambos</text>

  <rect x="20" y="226" width="360" height="140" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="246" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Guardar (siempre strings)</text>
  <text x="34" y="264" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">localStorage.setItem('theme', 'dark');</text>
  <text x="34" y="282" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Leer</text>
  <text x="34" y="300" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const theme = localStorage.getItem('theme');</text>
  <text x="34" y="318" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Eliminar clave</text>
  <text x="34" y="336" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">localStorage.removeItem('theme');</text>
  <text x="34" y="354" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">localStorage.clear(); // limpiar todo</text>

  <rect x="420" y="226" width="360" height="140" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="434" y="246" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Guardar objeto — JSON necesario</text>
  <text x="434" y="264" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const user = { name: 'Ana', role: 'admin' };</text>
  <text x="434" y="282" font-family="Courier,monospace" font-size="11" fill="#f0db4f">localStorage.setItem('user', JSON.stringify(user));</text>
  <text x="434" y="300" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Recuperar objeto</text>
  <text x="434" y="318" font-family="Courier,monospace" font-size="11" fill="#f0db4f">const raw = localStorage.getItem('user');</text>
  <text x="434" y="336" font-family="Courier,monospace" font-size="11" fill="#f0db4f">const data = raw ? JSON.parse(raw) : null;</text>

  <line x1="20" y1="386" x2="780" y2="386" stroke="#4a5568" stroke-width="1"/>

  <!-- When to use -->
  <rect x="20" y="396" width="362" height="86" fill="#1f2937" rx="6"/>
  <text x="34" y="416" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#93c5fd">Usar localStorage cuando:</text>
  <text x="34" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Preferencias de usuario (tema, idioma, config)</text>
  <text x="34" y="454" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Caché de datos que persisten entre visitas</text>
  <text x="34" y="472" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Tokens de sesión no críticos en seguridad</text>

  <rect x="418" y="396" width="362" height="86" fill="#1f2937" rx="6"/>
  <text x="434" y="416" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#86efac">Usar sessionStorage cuando:</text>
  <text x="434" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Datos del paso actual de un wizard/formulario</text>
  <text x="434" y="454" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Filtros activos de una vista temporal</text>
  <text x="434" y="472" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Estado de búsqueda que se debe reiniciar</text>

  <text x="400" y="496" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 19</text>
</svg>