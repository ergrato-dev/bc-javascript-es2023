<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Patrón de delegación de eventos</title>
  <desc id="desc">Un listener en contenedor para resolver acciones de múltiples elementos hijo.</desc>
  <rect width="1200" height="760" fill="#101010"/>
  <text x="40" y="56" fill="#F0DB4F" font-size="32" font-family="Inter, Roboto, sans-serif" font-weight="700">Event Delegation</text>
  <text x="40" y="88" fill="#D0D0D0" font-size="18" font-family="Inter, Roboto, sans-serif">Un solo listener, múltiples acciones dinámicas</text>

  <rect x="40" y="116" width="1120" height="78" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="148" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Objetivo de aprendizaje</text>
  <text x="60" y="172" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">Aplicar delegación para escalar listas sin registrar listeners por cada ítem.</text>

  <rect x="120" y="220" width="960" height="360" rx="14" fill="#171717" stroke="#2F2F2F"/>
  <text x="160" y="260" fill="#F0DB4F" font-size="20" font-family="Inter, Roboto, sans-serif">list.addEventListener('click', handler)</text>

  <rect x="200" y="290" width="240" height="230" rx="10" fill="#222" stroke="#4CAF50"/>
  <rect x="480" y="290" width="240" height="230" rx="10" fill="#222" stroke="#4CAF50"/>
  <rect x="760" y="290" width="240" height="230" rx="10" fill="#222" stroke="#4CAF50"/>
  <text x="278" y="360" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Item A</text>
  <text x="558" y="360" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Item B</text>
  <text x="838" y="360" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Item C</text>

  <rect x="245" y="400" width="150" height="42" rx="8" fill="#1B1B1B" stroke="#F0DB4F"/>
  <rect x="525" y="400" width="150" height="42" rx="8" fill="#1B1B1B" stroke="#F0DB4F"/>
  <rect x="805" y="400" width="150" height="42" rx="8" fill="#1B1B1B" stroke="#F0DB4F"/>
  <text x="280" y="427" fill="#F0DB4F" font-size="14" font-family="Inter, Roboto, sans-serif">data-action</text>
  <text x="560" y="427" fill="#F0DB4F" font-size="14" font-family="Inter, Roboto, sans-serif">data-action</text>
  <text x="840" y="427" fill="#F0DB4F" font-size="14" font-family="Inter, Roboto, sans-serif">data-action</text>

  <rect x="40" y="610" width="1120" height="120" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="642" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Lectura guiada y verificación</text>
  <text x="60" y="668" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">1) Explica por qué un ítem nuevo funciona sin agregar listener adicional.</text>
  <text x="60" y="692" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">2) ¿Qué ocurre si event.target no tiene data-action? (aplica early return)</text>
</svg>
