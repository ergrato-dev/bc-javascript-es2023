<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Event Delegation: un listener en el padre</text>

  <!-- Wrong: listeners individuales -->
  <text x="190" y="64" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#ef4444" text-anchor="middle">❌ Listener por elemento</text>

  <rect x="20" y="76" width="360" height="220" fill="#1f2937" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="36" y="98" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Problema: muchos listeners</text>
  <text x="36" y="116" font-family="Courier,monospace" font-size="11" fill="#fca5a5">const btns = document.querySelectorAll('.del-btn');</text>
  <text x="36" y="134" font-family="Courier,monospace" font-size="11" fill="#fca5a5">btns.forEach(btn =&gt; {</text>
  <text x="36" y="152" font-family="Courier,monospace" font-size="11" fill="#fca5a5">  btn.addEventListener('click', handler);</text>
  <text x="36" y="170" font-family="Courier,monospace" font-size="11" fill="#fca5a5">});</text>
  <text x="36" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Si se agregan items dinámicamente,</text>
  <text x="36" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">los nuevos NO tienen listener.</text>
  <text x="36" y="230" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Con 100 items = 100 listeners en memoria.</text>
  <text x="36" y="252" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Hay que limpiarlos al remover elementos</text>
  <text x="36" y="270" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">para evitar memory leaks.</text>

  <!-- Correct: delegation -->
  <text x="610" y="64" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#48bb78" text-anchor="middle">✅ Event delegation</text>

  <rect x="420" y="76" width="360" height="220" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="436" y="98" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Un listener en el contenedor padre</text>
  <text x="436" y="116" font-family="Courier,monospace" font-size="11" fill="#86efac">const list = document.querySelector('#list');</text>
  <text x="436" y="134" font-family="Courier,monospace" font-size="11" fill="#86efac">list.addEventListener('click', (e) =&gt; {</text>
  <text x="436" y="152" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const btn = e.target.closest('.del-btn');</text>
  <text x="436" y="170" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (!btn) return;</text>
  <text x="436" y="188" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  const id = btn.dataset.id;</text>
  <text x="436" y="206" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  deleteItem(id);</text>
  <text x="436" y="224" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>
  <text x="436" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Funciona para items futuros (dinámicos)</text>
  <text x="436" y="264" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Solo 1 listener en memoria</text>
  <text x="436" y="282" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ closest() maneja clics en hijos del botón</text>

  <line x1="30" y1="316" x2="770" y2="316" stroke="#4a5568" stroke-width="1"/>

  <!-- closest() explanation -->
  <text x="30" y="336" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">closest() — esencial en delegation</text>

  <rect x="30" y="348" width="360" height="130" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="368" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Cuando el clic es en un hijo del botón:</text>
  <text x="44" y="386" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">&lt;button class="del-btn" data-id="5"&gt;</text>
  <text x="44" y="404" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  &lt;svg&gt;&lt;!-- icono --&gt;&lt;/svg&gt;</text>
  <text x="44" y="422" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">&lt;/button&gt;</text>
  <text x="44" y="442" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// e.target puede ser el SVG o el botón</text>
  <text x="44" y="462" font-family="Courier,monospace" font-size="11" fill="#f0db4f">// closest() sube por el DOM hasta encontrar</text>
  <text x="44" y="474" font-family="Courier,monospace" font-size="11" fill="#f0db4f">// el primer ancestro que coincida</text>

  <rect x="410" y="348" width="360" height="130" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="368" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Delegation con múltiples acciones</text>
  <text x="424" y="390" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">list.addEventListener('click', (e) =&gt; {</text>
  <text x="424" y="408" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const { action, id } =</text>
  <text x="424" y="426" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    e.target.closest('[data-action]')?.dataset</text>
  <text x="424" y="444" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    ?? {};</text>
  <text x="424" y="462" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (action === 'delete') deleteItem(id);</text>
  <text x="424" y="480" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (action === 'edit') editItem(id);</text>
  <text x="424" y="492" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>

  <text x="400" y="498" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 18</text>
</svg>