<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">CustomEvent: comunicación entre componentes</text>

  <!-- Flow diagram -->
  <!-- Emitter -->
  <rect x="30" y="60" width="160" height="70" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="10"/>
  <text x="110" y="88" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">Componente A</text>
  <text x="110" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">emite evento</text>

  <!-- Arrow emit -->
  <line x1="190" y1="95" x2="320" y2="95" stroke="#f0db4f" stroke-width="2"/>
  <polygon points="318,90 328,95 318,100" fill="#f0db4f"/>
  <text x="255" y="86" font-family="system-ui,sans-serif" font-size="10" fill="#f0db4f" text-anchor="middle">dispatchEvent()</text>

  <!-- Event -->
  <rect x="330" y="60" width="140" height="70" fill="#451a03" stroke="#f0db4f" stroke-width="2" rx="10"/>
  <text x="400" y="84" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f" text-anchor="middle">CustomEvent</text>
  <text x="400" y="104" font-family="Courier,monospace" font-size="11" fill="#fed7aa" text-anchor="middle">'item-added'</text>

  <!-- Arrow received -->
  <line x1="470" y1="95" x2="600" y2="95" stroke="#48bb78" stroke-width="2"/>
  <polygon points="598,90 608,95 598,100" fill="#48bb78"/>
  <text x="535" y="86" font-family="system-ui,sans-serif" font-size="10" fill="#48bb78" text-anchor="middle">addEventListener()</text>

  <!-- Receiver -->
  <rect x="610" y="60" width="160" height="70" fill="#065f46" stroke="#48bb78" stroke-width="2" rx="10"/>
  <text x="690" y="88" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#86efac" text-anchor="middle">Componente B</text>
  <text x="690" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">escucha evento</text>

  <line x1="30" y1="152" x2="770" y2="152" stroke="#4a5568" stroke-width="1"/>

  <!-- Code: dispatch -->
  <text x="30" y="172" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Emitir CustomEvent con datos (detail)</text>
  <rect x="30" y="184" width="370" height="160" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="204" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// En el componente emisor</text>
  <text x="44" y="222" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const notifyItemAdded = (item) =&gt; {</text>
  <text x="44" y="240" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const event = new CustomEvent(</text>
  <text x="44" y="258" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    'item-added',</text>
  <text x="44" y="276" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    {</text>
  <text x="44" y="294" font-family="Courier,monospace" font-size="11" fill="#86efac">      detail: { item },</text>
  <text x="44" y="312" font-family="Courier,monospace" font-size="11" fill="#93c5fd">      bubbles: true</text>
  <text x="44" y="330" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    }</text>
  <text x="44" y="348" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  );</text>

  <!-- Code: listen -->
  <text x="420" y="172" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Escuchar y reaccionar</text>
  <rect x="420" y="184" width="360" height="160" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="434" y="204" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// En el componente receptor</text>
  <text x="434" y="222" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">document.addEventListener(</text>
  <text x="434" y="240" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  'item-added',</text>
  <text x="434" y="258" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  (e) =&gt; {</text>
  <text x="434" y="276" font-family="Courier,monospace" font-size="11" fill="#86efac">    const { item } = e.detail;</text>
  <text x="434" y="294" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    updateCounter(item);</text>
  <text x="434" y="312" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    renderItem(item);</text>
  <text x="434" y="330" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="434" y="348" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">);</text>

  <line x1="30" y1="364" x2="770" y2="364" stroke="#4a5568" stroke-width="1"/>

  <!-- dispatch call and use cases -->
  <rect x="30" y="376" width="370" height="90" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="396" font-family="Courier,monospace" font-size="11" fill="#a0aec0">  // Disparar el evento</text>
  <text x="44" y="414" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  document.dispatchEvent(event);</text>
  <text x="44" y="432" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="44" y="452" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">bubbles: true → sube por el DOM</text>

  <rect x="420" y="376" width="360" height="90" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="434" y="396" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Cuándo usar CustomEvent</text>
  <text x="434" y="416" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Comunicar componentes sin acoplarlos directamente</text>
  <text x="434" y="434" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Reemplaza callbacks complejos entre módulos</text>
  <text x="434" y="452" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Notificar cambios de estado globalmente</text>

  <text x="400" y="474" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 18</text>
</svg>