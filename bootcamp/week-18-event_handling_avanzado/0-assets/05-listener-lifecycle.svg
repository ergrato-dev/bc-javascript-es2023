<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de vida de listeners</title>
  <desc id="desc">Registro, uso y limpieza de listeners para evitar duplicados y fugas.</desc>
  <rect width="1200" height="760" fill="#101010"/>
  <text x="40" y="56" fill="#F0DB4F" font-size="32" font-family="Inter, Roboto, sans-serif" font-weight="700">Listener Lifecycle</text>
  <text x="40" y="88" fill="#D0D0D0" font-size="18" font-family="Inter, Roboto, sans-serif">mount -> active -> cleanup</text>

  <rect x="40" y="116" width="1120" height="78" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="148" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Objetivo de aprendizaje</text>
  <text x="60" y="172" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">Definir registro y limpieza explícita para evitar listeners duplicados.</text>

  <rect x="100" y="250" width="280" height="180" rx="14" fill="#1B1B1B" stroke="#F0DB4F"/>
  <text x="190" y="318" fill="#FFF" font-size="24" font-family="Inter, Roboto, sans-serif">Mount</text>
  <text x="125" y="356" fill="#BDBDBD" font-size="16" font-family="Inter, Roboto, sans-serif">addEventListener(...)</text>

  <rect x="460" y="250" width="280" height="180" rx="14" fill="#1B1B1B" stroke="#4CAF50"/>
  <text x="553" y="318" fill="#FFF" font-size="24" font-family="Inter, Roboto, sans-serif">Active</text>
  <text x="520" y="356" fill="#BDBDBD" font-size="16" font-family="Inter, Roboto, sans-serif">interacción normal</text>

  <rect x="820" y="250" width="280" height="180" rx="14" fill="#1B1B1B" stroke="#E53935"/>
  <text x="890" y="318" fill="#FFF" font-size="24" font-family="Inter, Roboto, sans-serif">Cleanup</text>
  <text x="840" y="356" fill="#BDBDBD" font-size="16" font-family="Inter, Roboto, sans-serif">removeEventListener(...)</text>

  <path d="M380 340 L460 340" stroke="#F0DB4F" stroke-width="4" marker-end="url(#arrowA)"/>
  <path d="M740 340 L820 340" stroke="#4CAF50" stroke-width="4" marker-end="url(#arrowB)"/>

  <rect x="40" y="610" width="1120" height="120" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="642" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Lectura guiada y verificación</text>
  <text x="60" y="668" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">1) ¿Qué síntoma indica que faltó cleanup? (ej. logs duplicados)</text>
  <text x="60" y="692" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">2) ¿Por qué conviene callback con referencia estable?</text>

  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#F0DB4F"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#4CAF50"/>
    </marker>
  </defs>
</svg>
