<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Ciclo de vida de listeners: add, once, remove y cleanup</text>

  <!-- addEventListener -->
  <rect x="20" y="54" width="365" height="180" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="Courier,monospace" font-size="13" font-weight="bold" fill="#86efac">addEventListener</text>
  <text x="36" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Registra listener que persiste</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const handler = (e) =&gt; handleClick(e);</text>
  <text x="36" y="136" font-family="Courier,monospace" font-size="11" fill="#86efac">btn.addEventListener('click', handler);</text>
  <text x="36" y="156" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">// Para usarlo con once:</text>
  <text x="36" y="174" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">btn.addEventListener('click', handler,</text>
  <text x="36" y="192" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  { once: true }  // se autoeliminina</text>
  <text x="36" y="210" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">);</text>
  <text x="36" y="228" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">once: útil para confirmaciones de un solo uso</text>

  <!-- removeEventListener -->
  <rect x="415" y="54" width="365" height="180" fill="#1f2937" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="431" y="76" font-family="Courier,monospace" font-size="13" font-weight="bold" fill="#fca5a5">removeEventListener</text>
  <text x="431" y="96" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Elimina listener registrado</text>
  <text x="431" y="118" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// ⚠️  Debe ser la MISMA referencia de función</text>
  <text x="431" y="136" font-family="Courier,monospace" font-size="11" fill="#fca5a5">btn.removeEventListener('click', handler);</text>
  <text x="431" y="156" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// ❌ Esto NO funciona — función anónima nueva</text>
  <text x="431" y="174" font-family="Courier,monospace" font-size="11" fill="#ef4444">btn.removeEventListener('click', (e) =&gt; {});</text>
  <text x="431" y="196" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Conservar referencia de la función</text>
  <text x="431" y="216" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Mismas opciones (capture) que al registrar</text>

  <line x1="20" y1="252" x2="780" y2="252" stroke="#4a5568" stroke-width="1"/>

  <!-- Cleanup pattern -->
  <text x="20" y="272" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Patrón de cleanup (evitar memory leaks)</text>

  <rect x="20" y="284" width="365" height="170" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="304" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Cleanup cuando el componente se desmonta</text>
  <text x="34" y="322" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const setup = () =&gt; {</text>
  <text x="34" y="340" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const handler = (e) =&gt; handleClick(e);</text>
  <text x="34" y="358" font-family="Courier,monospace" font-size="11" fill="#86efac">  btn.addEventListener('click', handler);</text>
  <text x="34" y="376" font-family="Courier,monospace" font-size="11" fill="#a0aec0">  // Retorna función de cleanup</text>
  <text x="34" y="394" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return () =&gt; {</text>
  <text x="34" y="412" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    btn.removeEventListener('click', handler);</text>
  <text x="34" y="430" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  };</text>
  <text x="34" y="448" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <rect x="415" y="284" width="365" height="170" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="429" y="304" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// AbortController para cleanup masivo</text>
  <text x="429" y="322" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const ctrl = new AbortController();</text>
  <text x="429" y="340" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const sig = ctrl.signal;</text>
  <text x="429" y="358" font-family="Courier,monospace" font-size="11" fill="#86efac">btn.addEventListener('click', h1, { signal: sig });</text>
  <text x="429" y="376" font-family="Courier,monospace" font-size="11" fill="#86efac">doc.addEventListener('keydown', h2, { signal: sig });</text>
  <text x="429" y="396" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Eliminar todos de una vez</text>
  <text x="429" y="414" font-family="Courier,monospace" font-size="11" fill="#fca5a5">ctrl.abort();</text>
  <text x="429" y="434" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Solución moderna para cleanup múltiple</text>

  <text x="400" y="474" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 18</text>
</svg>