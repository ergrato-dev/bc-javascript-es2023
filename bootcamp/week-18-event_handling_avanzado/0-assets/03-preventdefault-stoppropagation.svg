<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="21" font-weight="bold" fill="#f0db4f" text-anchor="middle">preventDefault() vs stopPropagation()</text>

  <!-- preventDefault -->
  <text x="190" y="64" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#4299e1" text-anchor="middle">preventDefault()</text>
  <rect x="20" y="74" width="360" height="210" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="36" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#93c5fd">¿Qué hace?</text>
  <text x="36" y="114" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Cancela la acción por defecto del navegador.</text>
  <text x="36" y="132" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">El evento SIGUE propagándose por el DOM.</text>
  <text x="36" y="154" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Formulario: evitar recarga</text>
  <text x="36" y="172" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">form.addEventListener('submit', (e) =&gt; {</text>
  <text x="36" y="190" font-family="Courier,monospace" font-size="11" fill="#93c5fd">  e.preventDefault();</text>
  <text x="36" y="208" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  // manejar con JS en lugar de HTTP</text>
  <text x="36" y="226" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  handleFormSubmit(e);</text>
  <text x="36" y="244" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>
  <text x="36" y="264" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ form submit · link navigation</text>
  <text x="36" y="280" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ checkbox · context menu · drag</text>

  <!-- stopPropagation -->
  <text x="610" y="64" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="#ed8936" text-anchor="middle">stopPropagation()</text>
  <rect x="420" y="74" width="360" height="210" fill="#1f2937" stroke="#ed8936" stroke-width="2" rx="8"/>
  <text x="436" y="96" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fed7aa">¿Qué hace?</text>
  <text x="436" y="114" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Detiene la propagación del evento por el DOM.</text>
  <text x="436" y="132" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">La acción por defecto del navegador ocurre igual.</text>
  <text x="436" y="154" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Evitar que el clic en modal cierre el overlay</text>
  <text x="436" y="172" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">modal.addEventListener('click', (e) =&gt; {</text>
  <text x="436" y="190" font-family="Courier,monospace" font-size="11" fill="#fed7aa">  e.stopPropagation();</text>
  <text x="436" y="208" font-family="Courier,monospace" font-size="11" fill="#a0aec0">  // El clic no llega al overlay</text>
  <text x="436" y="226" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>
  <text x="436" y="246" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">overlay.addEventListener('click', close);</text>
  <text x="436" y="264" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Aislar componentes que comparten padre</text>
  <text x="436" y="280" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Usar con moderación — rompe delegation</text>

  <line x1="30" y1="304" x2="770" y2="304" stroke="#4a5568" stroke-width="1"/>

  <!-- Combined use case -->
  <text x="30" y="324" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Uso combinado y comparación rápida</text>

  <rect x="30" y="336" width="360" height="120" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="356" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Ambos en un link dentro de lista</text>
  <text x="44" y="374" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">link.addEventListener('click', (e) =&gt; {</text>
  <text x="44" y="392" font-family="Courier,monospace" font-size="11" fill="#93c5fd">  e.preventDefault();    // no navega</text>
  <text x="44" y="410" font-family="Courier,monospace" font-size="11" fill="#fed7aa">  e.stopPropagation();   // no sube al padre</text>
  <text x="44" y="428" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  handleClick(e);</text>
  <text x="44" y="446" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>

  <rect x="410" y="336" width="360" height="120" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="356" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#f0db4f">Diferencia clave</text>
  <text x="424" y="378" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">preventDefault  → para el browser, no el DOM</text>
  <text x="424" y="398" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">stopPropagation → para el DOM, no el browser</text>
  <text x="424" y="420" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">stopImmediatePropagation() también detiene</text>
  <text x="424" y="438" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">otros listeners en el mismo elemento.</text>

  <text x="400" y="474" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 18</text>
</svg>