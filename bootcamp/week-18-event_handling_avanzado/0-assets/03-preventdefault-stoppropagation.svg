<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Control de flujo: preventDefault y stopPropagation</title>
  <desc id="desc">Comparación funcional de ambos métodos con casos de uso.</desc>
  <rect width="1200" height="760" fill="#101010"/>
  <text x="40" y="56" fill="#F0DB4F" font-size="32" font-family="Inter, Roboto, sans-serif" font-weight="700">Control del Flujo del Evento</text>
  <text x="40" y="88" fill="#D0D0D0" font-size="18" font-family="Inter, Roboto, sans-serif">Elegir el método correcto según el problema</text>

  <rect x="40" y="116" width="1120" height="78" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="148" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Objetivo de aprendizaje</text>
  <text x="60" y="172" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">Distinguir entre cancelar comportamiento nativo y detener propagación.</text>

  <rect x="80" y="220" width="500" height="350" rx="14" fill="#171717" stroke="#4CAF50"/>
  <text x="110" y="270" fill="#4CAF50" font-size="24" font-family="Inter, Roboto, sans-serif" font-weight="700">preventDefault()</text>
  <text x="110" y="308" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Cancela la acción por defecto del navegador.</text>
  <text x="110" y="340" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Ejemplos: submit, navegación, menú contextual.</text>
  <text x="110" y="392" fill="#BDBDBD" font-size="16" font-family="Inter, Roboto, sans-serif">No detiene bubbling automáticamente.</text>

  <rect x="620" y="220" width="500" height="350" rx="14" fill="#171717" stroke="#E53935"/>
  <text x="650" y="270" fill="#E53935" font-size="24" font-family="Inter, Roboto, sans-serif" font-weight="700">stopPropagation()</text>
  <text x="650" y="308" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Detiene la propagación a nodos ancestros.</text>
  <text x="650" y="340" fill="#FFF" font-size="18" font-family="Inter, Roboto, sans-serif">Útil cuando hay conflicto real de handlers.</text>
  <text x="650" y="392" fill="#BDBDBD" font-size="16" font-family="Inter, Roboto, sans-serif">No cancela la acción nativa por sí solo.</text>

  <rect x="40" y="610" width="1120" height="120" rx="10" fill="#1A1A1A" stroke="#333"/>
  <text x="60" y="642" fill="#F0DB4F" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">Lectura guiada y verificación</text>
  <text x="60" y="668" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">1) Caso formulario: ¿cuál usarías y por qué?</text>
  <text x="60" y="692" fill="#EFEFEF" font-size="16" font-family="Inter, Roboto, sans-serif">2) Caso click anidado: ¿cómo evitas doble ejecución no deseada?</text>
</svg>
