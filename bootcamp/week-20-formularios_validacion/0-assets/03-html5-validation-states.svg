<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Estados de validación HTML5</title>
  <desc id="desc">Representación de campos validos e invalidos con atributos nativos.</desc>
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="30" y="40" fill="#f0db4f" font-size="28" font-family="system-ui, sans-serif" font-weight="700">HTML5 Validation States</text>

  <rect x="60" y="95" width="320" height="165" rx="12" fill="#2d3748" stroke="#48bb78"/>
  <text x="85" y="130" fill="#48bb78" font-size="20" font-family="system-ui, sans-serif" font-weight="700">:valid</text>
  <text x="85" y="165" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">email="ana@mail.com"</text>
  <text x="85" y="194" fill="#a0aec0" font-size="15" font-family="system-ui, sans-serif">required + type="email" cumplido</text>

  <rect x="420" y="95" width="320" height="165" rx="12" fill="#2d3748" stroke="#ef4444"/>
  <text x="445" y="130" fill="#ef4444" font-size="20" font-family="system-ui, sans-serif" font-weight="700">:invalid</text>
  <text x="445" y="165" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">email="ana-mail"</text>
  <text x="445" y="194" fill="#a0aec0" font-size="15" font-family="system-ui, sans-serif">formato incorrecto</text>

  <rect x="60" y="300" width="680" height="160" rx="12" fill="#111827" stroke="#334155"/>
  <text x="80" y="338" fill="#f0db4f" font-size="20" font-family="system-ui, sans-serif" font-weight="700">Atributos más usados</text>
  <text x="80" y="370" fill="#e2e8f0" font-size="16" font-family="Courier, monospace">required, minlength, maxlength, type, pattern, min, max</text>
  <text x="80" y="400" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Combina validación nativa con mensajes personalizados.</text>
  <text x="80" y="430" fill="#a0aec0" font-size="15" font-family="system-ui, sans-serif">Evita depender solo de validación visual.</text>
</svg>
