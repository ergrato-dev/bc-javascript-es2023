<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline de validación personalizada</title>
  <desc id="desc">Secuencia completa desde captura hasta envio final con control de errores.</desc>
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="30" y="40" fill="#f0db4f" font-size="28" font-family="system-ui, sans-serif" font-weight="700">Custom Validation Pipeline</text>

  <rect x="40" y="100" width="130" height="70" rx="9" fill="#2d3748" stroke="#4299e1"/>
  <text x="68" y="143" fill="#e2e8f0" font-size="14" font-family="system-ui, sans-serif">Captura</text>

  <rect x="190" y="100" width="130" height="70" rx="9" fill="#2d3748" stroke="#48bb78"/>
  <text x="212" y="143" fill="#e2e8f0" font-size="14" font-family="system-ui, sans-serif">HTML5</text>

  <rect x="340" y="100" width="130" height="70" rx="9" fill="#2d3748" stroke="#f0db4f"/>
  <text x="355" y="143" fill="#e2e8f0" font-size="14" font-family="system-ui, sans-serif">Constraint API</text>

  <rect x="490" y="100" width="130" height="70" rx="9" fill="#2d3748" stroke="#4299e1"/>
  <text x="518" y="143" fill="#e2e8f0" font-size="14" font-family="system-ui, sans-serif">Reglas negocio</text>

  <rect x="640" y="100" width="130" height="70" rx="9" fill="#2d3748" stroke="#48bb78"/>
  <text x="673" y="143" fill="#e2e8f0" font-size="14" font-family="system-ui, sans-serif">Submit</text>

  <path d="M170 135 H190" stroke="#a0aec0" stroke-width="3"/>
  <path d="M320 135 H340" stroke="#a0aec0" stroke-width="3"/>
  <path d="M470 135 H490" stroke="#a0aec0" stroke-width="3"/>
  <path d="M620 135 H640" stroke="#a0aec0" stroke-width="3"/>

  <rect x="40" y="230" width="730" height="220" rx="12" fill="#111827" stroke="#334155"/>
  <text x="60" y="270" fill="#f0db4f" font-size="20" font-family="system-ui, sans-serif" font-weight="700">Control de flujo recomendado</text>
  <text x="60" y="305" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">1. Bloquear submit si falla cualquier capa de validación</text>
  <text x="60" y="335" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">2. Mostrar mensaje específico por campo</text>
  <text x="60" y="365" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">3. Evitar doble envío (deshabilitar botón temporalmente)</text>
  <text x="60" y="395" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">4. Confirmar éxito y limpiar estado cuando corresponda</text>
</svg>
