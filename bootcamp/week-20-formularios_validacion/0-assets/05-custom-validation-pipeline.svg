<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490">
  <rect width="800" height="490" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="21" font-weight="bold" fill="#f0db4f" text-anchor="middle">Pipeline de validación personalizada</text>

  <!-- Pipeline stages -->
  <rect x="20" y="54" width="110" height="54" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="75" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">1. Sanear</text>
  <text x="75" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">trim(), lowercase</text>

  <line x1="130" y1="81" x2="162" y2="81" stroke="#4a5568" stroke-width="2"/>
  <polygon points="160,76 170,81 160,86" fill="#4a5568"/>

  <rect x="172" y="54" width="110" height="54" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="227" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">2. Obligatorio</text>
  <text x="227" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">¿está vacío?</text>

  <line x1="282" y1="81" x2="314" y2="81" stroke="#4a5568" stroke-width="2"/>
  <polygon points="312,76 322,81 312,86" fill="#4a5568"/>

  <rect x="324" y="54" width="110" height="54" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="379" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">3. Formato</text>
  <text x="379" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">regex, type check</text>

  <line x1="434" y1="81" x2="466" y2="81" stroke="#4a5568" stroke-width="2"/>
  <polygon points="464,76 474,81 464,86" fill="#4a5568"/>

  <rect x="476" y="54" width="110" height="54" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="531" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd" text-anchor="middle">4. Rango/Límite</text>
  <text x="531" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">min, max, length</text>

  <line x1="586" y1="81" x2="618" y2="81" stroke="#4a5568" stroke-width="2"/>
  <polygon points="616,76 626,81 616,86" fill="#4a5568"/>

  <rect x="628" y="54" width="115" height="54" fill="#1e3a5f" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="685" y="78" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#86efac" text-anchor="middle">5. ✅ Válido</text>
  <text x="685" y="96" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">procesar datos</text>

  <line x1="30" y1="128" x2="770" y2="128" stroke="#4a5568" stroke-width="1"/>

  <!-- Code: validate function -->
  <text x="20" y="148" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Validador reutilizable por campo</text>

  <rect x="20" y="160" width="370" height="210" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="180" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Cada regla: { test(v), message }</text>
  <text x="34" y="198" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const rules = {</text>
  <text x="34" y="216" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  email: [</text>
  <text x="34" y="234" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    { test: v =&gt; v.trim() !== '',</text>
  <text x="34" y="252" font-family="Courier,monospace" font-size="11" fill="#fca5a5">      message: 'El email es requerido' },</text>
  <text x="34" y="270" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    { test: v =&gt; /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),</text>
  <text x="34" y="288" font-family="Courier,monospace" font-size="11" fill="#fca5a5">      message: 'Formato de email inválido' },</text>
  <text x="34" y="306" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  ],</text>
  <text x="34" y="324" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="34" y="344" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Composición: agregar reglas sin tocar</text>
  <text x="34" y="362" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">las existentes</text>

  <rect x="410" y="160" width="370" height="210" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="180" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Ejecutar pipeline para un campo</text>
  <text x="424" y="198" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const validate = (field, value) =&gt; {</text>
  <text x="424" y="216" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const fieldRules = rules[field] ?? [];</text>
  <text x="424" y="234" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  for (const rule of fieldRules) {</text>
  <text x="424" y="252" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    if (!rule.test(value)) {</text>
  <text x="424" y="270" font-family="Courier,monospace" font-size="11" fill="#fca5a5">      return { valid: false, message: rule.message };</text>
  <text x="424" y="288" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    }</text>
  <text x="424" y="306" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="424" y="324" font-family="Courier,monospace" font-size="11" fill="#86efac">  return { valid: true, message: '' };</text>
  <text x="424" y="342" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <line x1="20" y1="390" x2="780" y2="390" stroke="#4a5568" stroke-width="1"/>

  <!-- Show errors -->
  <text x="20" y="410" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Conectar al DOM y al submit</text>
  <rect x="20" y="422" width="760" height="58" fill="#1f2937" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="442" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">input.addEventListener('blur', () =&gt; {</text>
  <text x="34" y="460" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  const { valid, message } = validate('email', input.value);</text>
  <text x="34" y="474" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  errorSpan.textContent = valid ? '' : message;</text>
  <text x="280" y="442" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  input.setCustomValidity(valid ? '' : message);</text>
  <text x="280" y="460" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>

  <text x="400" y="487" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 20</text>
</svg>