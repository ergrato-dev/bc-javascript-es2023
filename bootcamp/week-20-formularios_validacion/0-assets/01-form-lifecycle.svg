<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de vida de formulario</title>
  <desc id="desc">Flujo desde entrada de datos hasta submit y respuesta.</desc>
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="30" y="40" fill="#f0db4f" font-size="28" font-family="system-ui, sans-serif" font-weight="700">Ciclo de Vida del Formulario</text>

  <rect x="40" y="110" width="150" height="80" rx="10" fill="#2d3748" stroke="#4299e1"/>
  <text x="65" y="155" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Input usuario</text>

  <rect x="230" y="110" width="150" height="80" rx="10" fill="#2d3748" stroke="#f0db4f"/>
  <text x="256" y="155" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">FormData</text>

  <rect x="420" y="110" width="150" height="80" rx="10" fill="#2d3748" stroke="#48bb78"/>
  <text x="435" y="155" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Validación</text>

  <rect x="610" y="110" width="150" height="80" rx="10" fill="#2d3748" stroke="#4299e1"/>
  <text x="652" y="155" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Submit</text>

  <path d="M190 150 H230" stroke="#a0aec0" stroke-width="3"/>
  <path d="M380 150 H420" stroke="#a0aec0" stroke-width="3"/>
  <path d="M570 150 H610" stroke="#a0aec0" stroke-width="3"/>

  <rect x="40" y="250" width="720" height="200" rx="12" fill="#111827" stroke="#334155"/>
  <text x="60" y="290" fill="#f0db4f" font-size="20" font-family="system-ui, sans-serif" font-weight="700">Puntos de control</text>
  <text x="60" y="325" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">1. Campos completos y coherentes</text>
  <text x="60" y="355" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">2. Validación nativa + personalizada</text>
  <text x="60" y="385" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">3. Feedback claro antes de enviar</text>
  <text x="60" y="415" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">4. Prevención de doble submit</text>
</svg>
