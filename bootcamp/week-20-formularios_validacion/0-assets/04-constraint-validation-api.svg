<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Constraint Validation API</title>
  <desc id="desc">Flujo de validación programática con checkValidity y setCustomValidity.</desc>
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="30" y="40" fill="#f0db4f" font-size="28" font-family="system-ui, sans-serif" font-weight="700">Constraint Validation API</text>

  <rect x="70" y="105" width="190" height="90" rx="10" fill="#2d3748" stroke="#4299e1"/>
  <text x="98" y="157" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">checkValidity()</text>

  <rect x="305" y="105" width="190" height="90" rx="10" fill="#2d3748" stroke="#48bb78"/>
  <text x="334" y="157" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">setCustomValidity()</text>

  <rect x="540" y="105" width="190" height="90" rx="10" fill="#2d3748" stroke="#f0db4f"/>
  <text x="573" y="157" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">reportValidity()</text>

  <path d="M260 150 H305" stroke="#a0aec0" stroke-width="3"/>
  <path d="M495 150 H540" stroke="#a0aec0" stroke-width="3"/>

  <rect x="70" y="245" width="660" height="210" rx="12" fill="#111827" stroke="#334155"/>
  <text x="90" y="285" fill="#f0db4f" font-size="20" font-family="system-ui, sans-serif" font-weight="700">Escenario práctico</text>
  <text x="90" y="318" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Usuario: "ab"</text>
  <text x="90" y="346" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Regla de negocio: username >= 6 caracteres</text>
  <text x="90" y="374" fill="#a0aec0" font-size="15" font-family="Courier, monospace">input.setCustomValidity('Minimo 6 caracteres')</text>
  <text x="90" y="402" fill="#a0aec0" font-size="15" font-family="Courier, monospace">input.reportValidity()</text>
  <text x="90" y="430" fill="#e2e8f0" font-size="16" font-family="system-ui, sans-serif">Al corregir: limpiar mensaje con setCustomValidity('')</text>
</svg>
