<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Zonas horarias: UTC vs local vs IANA</text>

  <!-- UTC side -->
  <rect x="20" y="54" width="365" height="185" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd">Métodos UTC — fecha/hora en UTC</text>
  <text x="36" y="98" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const d = new Date('2025-06-15T16:00:00Z');</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getUTCHours()   </text>
  <text x="200" y="118" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// 16 (UTC)</text>
  <text x="36" y="138" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getHours()      </text>
  <text x="200" y="138" font-family="Courier,monospace" font-size="11" fill="#fca5a5">// 10 (UTC-6 CDMX)</text>
  <text x="36" y="160" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getUTCDate()    </text>
  <text x="200" y="160" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// 15</text>
  <text x="36" y="180" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.toISOString()   </text>
  <text x="200" y="180" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// '2025-06-15T16:00:00.000Z'</text>
  <text x="36" y="200" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Preferir UTC al almacenar o comparar fechas</text>
  <text x="36" y="220" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">toISOString() siempre devuelve UTC con Z</text>
  <text x="36" y="234" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">getTimezoneOffset() → minutos respecto a UTC</text>

  <!-- Intl timezone -->
  <rect x="415" y="54" width="365" height="185" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="431" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#86efac">Mostrar en zona IANA con Intl</text>
  <text x="431" y="98" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Mostrar en múltiples zonas horarias</text>
  <text x="431" y="116" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const show = (d, tz) =&gt;</text>
  <text x="431" y="134" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  d.toLocaleString('es-MX', { timeZone: tz });</text>
  <text x="431" y="154" font-family="Courier,monospace" font-size="11" fill="#f0db4f">show(d, 'America/Mexico_City');</text>
  <text x="431" y="172" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '15/6/2025 10:00:00'</text>
  <text x="431" y="192" font-family="Courier,monospace" font-size="11" fill="#f0db4f">show(d, 'Europe/Madrid');</text>
  <text x="431" y="210" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '15/6/2025 18:00:00' (UTC+2 verano)</text>
  <text x="431" y="230" font-family="Courier,monospace" font-size="11" fill="#f0db4f">show(d, 'UTC');</text>
  <text x="431" y="248" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '15/6/2025 16:00:00'</text>

  <line x1="20" y1="258" x2="780" y2="258" stroke="#4a5568" stroke-width="1"/>

  <!-- Best practices -->
  <text x="20" y="278" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Mejores prácticas con zonas horarias</text>

  <rect x="20" y="290" width="365" height="170" fill="#171e2e" rx="6" stroke="#ef4444" stroke-width="1"/>
  <text x="34" y="310" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">❌ Errores comunes</text>
  <text x="34" y="332" font-family="Courier,monospace" font-size="11" fill="#ef4444">new Date('2025-06-15')</text>
  <text x="34" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">  ⚠️  sin Z = hora local del cliente</text>
  <text x="34" y="372" font-family="Courier,monospace" font-size="11" fill="#ef4444">d.getMonth() + 1</text>
  <text x="34" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">  ⚠️  olvida sumar 1 al mes</text>
  <text x="34" y="412" font-family="Courier,monospace" font-size="11" fill="#ef4444">date1.getTime() === date2.getTime()</text>
  <text x="34" y="430" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">  vs date1 === date2 (siempre false)</text>
  <text x="34" y="452" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// Correcto: comparar timestamps</text>

  <rect x="415" y="290" width="365" height="170" fill="#171e2e" rx="6" stroke="#48bb78" stroke-width="1"/>
  <text x="429" y="310" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#86efac">✅ Prácticas correctas</text>
  <text x="429" y="332" font-family="Courier,monospace" font-size="11" fill="#86efac">new Date('2025-06-15T00:00:00Z')</text>
  <text x="429" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">  con Z = siempre UTC</text>
  <text x="429" y="372" font-family="Courier,monospace" font-size="11" fill="#86efac">d.getUTCMonth() + 1</text>
  <text x="429" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">  mes en UTC sin ambigüedad</text>
  <text x="429" y="412" font-family="Courier,monospace" font-size="11" fill="#86efac">a.getTime() === b.getTime()</text>
  <text x="429" y="430" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">  comparar por valor numérico</text>
  <text x="429" y="452" font-family="Courier,monospace" font-size="11" fill="#86efac">a.toISOString() para guardar en DB</text>

  <text x="400" y="476" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 21</text>
</svg>