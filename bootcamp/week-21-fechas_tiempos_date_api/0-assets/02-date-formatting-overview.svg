<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490">
  <rect width="800" height="490" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Formatear fechas con Intl.DateTimeFormat</text>

  <!-- Basic toLocaleString -->
  <rect x="20" y="54" width="365" height="160" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd">toLocaleString(locale, options)</text>
  <text x="36" y="98" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const d = new Date('2025-06-15T10:30:00');</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#f0db4f">d.toLocaleString('es-MX');</text>
  <text x="36" y="136" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '15/6/2025 10:30:00'</text>
  <text x="36" y="156" font-family="Courier,monospace" font-size="11" fill="#f0db4f">d.toLocaleDateString('es-MX');</text>
  <text x="36" y="174" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '15/6/2025'</text>
  <text x="36" y="194" font-family="Courier,monospace" font-size="11" fill="#f0db4f">d.toLocaleTimeString('es-MX');</text>
  <text x="36" y="206" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// '10:30:00'</text>

  <!-- Intl.DateTimeFormat with options -->
  <rect x="415" y="54" width="365" height="160" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="431" y="76" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#86efac">Intl.DateTimeFormat — control total</text>
  <text x="431" y="98" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const fmt = new Intl.DateTimeFormat('es-MX', {</text>
  <text x="431" y="116" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  weekday: 'long',   // 'domingo'</text>
  <text x="431" y="134" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  day: 'numeric',    // '15'</text>
  <text x="431" y="152" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  month: 'long',     // 'junio'</text>
  <text x="431" y="170" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  year: 'numeric',   // '2025'</text>
  <text x="431" y="188" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">});</text>
  <text x="431" y="206" font-family="Courier,monospace" font-size="11" fill="#f0db4f">fmt.format(d); // 'domingo, 15 de junio de 2025'</text>

  <line x1="20" y1="234" x2="780" y2="234" stroke="#4a5568" stroke-width="1"/>

  <!-- Options table -->
  <text x="20" y="254" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Opciones de formato disponibles</text>

  <rect x="20" y="266" width="760" height="180" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="286" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd">Opción</text>
  <text x="200" y="286" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd">Valores</text>
  <text x="450" y="286" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#93c5fd">Ejemplo (es-MX)</text>

  <line x1="34" y1="292" x2="766" y2="292" stroke="#2d3748" stroke-width="1"/>

  <text x="34" y="310" font-family="Courier,monospace" font-size="11" fill="#f0db4f">year</text>
  <text x="200" y="310" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'numeric' | '2-digit'</text>
  <text x="450" y="310" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'2025' o '25'</text>

  <text x="34" y="330" font-family="Courier,monospace" font-size="11" fill="#f0db4f">month</text>
  <text x="200" y="330" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'long' | 'short' | 'narrow' | '2-digit'</text>
  <text x="450" y="330" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'junio' | 'jun' | 'J' | '06'</text>

  <text x="34" y="350" font-family="Courier,monospace" font-size="11" fill="#f0db4f">day</text>
  <text x="200" y="350" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'numeric' | '2-digit'</text>
  <text x="450" y="350" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'15' o '15'</text>

  <text x="34" y="370" font-family="Courier,monospace" font-size="11" fill="#f0db4f">weekday</text>
  <text x="200" y="370" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'long' | 'short' | 'narrow'</text>
  <text x="450" y="370" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'domingo' | 'dom' | 'D'</text>

  <text x="34" y="390" font-family="Courier,monospace" font-size="11" fill="#f0db4f">hour / minute / second</text>
  <text x="200" y="390" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'numeric' | '2-digit'</text>
  <text x="450" y="390" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'10' | '08'</text>

  <text x="34" y="410" font-family="Courier,monospace" font-size="11" fill="#f0db4f">hour12</text>
  <text x="200" y="410" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">true | false</text>
  <text x="450" y="410" font-family="Courier,monospace" font-size="11" fill="#a0aec0">'10:30 a.m.' | '10:30'</text>

  <text x="34" y="430" font-family="Courier,monospace" font-size="11" fill="#f0db4f">timeZone</text>
  <text x="200" y="430" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'UTC' | 'America/Mexico_City' | ...</text>
  <text x="450" y="430" font-family="Courier,monospace" font-size="11" fill="#a0aec0">string IANA</text>

  <text x="34" y="450" font-family="Courier,monospace" font-size="11" fill="#f0db4f">dateStyle</text>
  <text x="200" y="450" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">'full' | 'long' | 'medium' | 'short'</text>
  <text x="450" y="450" font-family="Courier,monospace" font-size="11" fill="#a0aec0">atajo conveniente</text>

  <text x="400" y="484" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 21</text>
</svg>