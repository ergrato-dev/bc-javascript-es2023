<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490">
  <rect width="800" height="490" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="21" font-weight="bold" fill="#f0db4f" text-anchor="middle">Date vs Temporal API (propuesta TC39)</text>

  <!-- Date problems -->
  <rect x="20" y="54" width="365" height="230" fill="#1f2937" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fca5a5">😕 Problemas de Date</text>

  <text x="36" y="100" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Mutabilidad</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#fca5a5">const d = new Date();</text>
  <text x="36" y="136" font-family="Courier,monospace" font-size="11" fill="#ef4444">d.setMonth(5); // muta el objeto</text>

  <text x="36" y="158" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Meses 0-indexed</text>
  <text x="36" y="176" font-family="Courier,monospace" font-size="11" fill="#fca5a5">new Date(2025, 0, 1) // enero = 0</text>

  <text x="36" y="198" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Sin soporte DST real</text>
  <text x="36" y="216" font-family="Courier,monospace" font-size="11" fill="#fca5a5">No sabe de cambios de horario</text>

  <text x="36" y="238" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">Parsing inconsistente</text>
  <text x="36" y="256" font-family="Courier,monospace" font-size="11" fill="#fca5a5">new Date('2025-06-15') ← local o UTC?</text>
  <text x="36" y="274" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">  depende del navegador</text>

  <!-- Temporal solution -->
  <rect x="415" y="54" width="365" height="230" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="431" y="76" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#86efac">✅ Temporal API (Stage 3)</text>

  <text x="431" y="100" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#48bb78">Inmutable — devuelve nuevos objetos</text>
  <text x="431" y="118" font-family="Courier,monospace" font-size="11" fill="#86efac">const d = Temporal.Now.plainDateISO();</text>
  <text x="431" y="136" font-family="Courier,monospace" font-size="11" fill="#86efac">const next = d.add({ months: 1 });</text>

  <text x="431" y="158" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#48bb78">Meses 1-indexed (naturales)</text>
  <text x="431" y="176" font-family="Courier,monospace" font-size="11" fill="#86efac">new Temporal.PlainDate(2025, 6, 15)</text>
  <text x="431" y="194" font-family="Courier,monospace" font-size="11" fill="#a0aec0">   // junio = 6 ✓</text>

  <text x="431" y="216" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#48bb78">Timezone explícita y DST-aware</text>
  <text x="431" y="234" font-family="Courier,monospace" font-size="11" fill="#86efac">Temporal.ZonedDateTime</text>
  <text x="431" y="252" font-family="Courier,monospace" font-size="11" fill="#86efac">Temporal.PlainDate / PlainTime</text>
  <text x="431" y="270" font-family="Courier,monospace" font-size="11" fill="#a0aec0">Tipos distintos para cada caso de uso</text>

  <line x1="20" y1="302" x2="780" y2="302" stroke="#4a5568" stroke-width="1"/>

  <!-- Code comparison -->
  <text x="20" y="322" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Comparación de código</text>

  <rect x="20" y="334" width="365" height="136" fill="#171e2e" rx="6" stroke="#ef4444" stroke-width="1"/>
  <text x="34" y="354" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">Date (hoy)</text>
  <text x="34" y="374" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const d = new Date();</text>
  <text x="34" y="392" font-family="Courier,monospace" font-size="11" fill="#fca5a5">const m = new Date(d); // copia manual</text>
  <text x="34" y="410" font-family="Courier,monospace" font-size="11" fill="#fca5a5">m.setMonth(m.getMonth() + 1); // muta</text>
  <text x="34" y="430" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const diff = d2 - d1;  // ms crudo</text>
  <text x="34" y="448" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// Math.floor(diff / 86_400_000) días</text>
  <text x="34" y="466" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// conversión manual necesaria</text>

  <rect x="415" y="334" width="365" height="136" fill="#171e2e" rx="6" stroke="#48bb78" stroke-width="1"/>
  <text x="429" y="354" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#86efac">Temporal (futuro próximo)</text>
  <text x="429" y="374" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const d = Temporal.Now.plainDateISO();</text>
  <text x="429" y="392" font-family="Courier,monospace" font-size="11" fill="#86efac">const next = d.add({ months: 1 });</text>
  <text x="429" y="410" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// d no muta — next es nuevo objeto</text>
  <text x="429" y="430" font-family="Courier,monospace" font-size="11" fill="#86efac">const diff = d2.since(d1);</text>
  <text x="429" y="448" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">diff.days  // días directo</text>
  <text x="429" y="466" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">diff.hours // horas directo</text>

  <text x="400" y="486" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 21</text>
</svg>