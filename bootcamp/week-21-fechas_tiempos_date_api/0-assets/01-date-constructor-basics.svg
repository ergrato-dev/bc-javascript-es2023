<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Date: cuatro formas de construir una fecha</text>

  <!-- Form 1: no args -->
  <rect x="20" y="54" width="365" height="95" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="36" y="76" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#93c5fd">1. Sin argumentos — fecha/hora actual</text>
  <text x="36" y="98" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">const now = new Date();</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Thu Jan 01 2025 10:30:00 GMT-0600</text>
  <text x="36" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">getTime() → milisegundos desde epoch Unix</text>

  <!-- Form 2: timestamp -->
  <rect x="415" y="54" width="365" height="95" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="431" y="76" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#86efac">2. Timestamp (milisegundos desde epoch)</text>
  <text x="431" y="98" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">const d = new Date(1735689600000);</text>
  <text x="431" y="118" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// 1 enero 2025 00:00:00 UTC</text>
  <text x="431" y="138" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">Date.now() → timestamp actual sin crear objeto</text>

  <!-- Form 3: ISO string -->
  <rect x="20" y="162" width="365" height="95" fill="#1f2937" stroke="#f0db4f" stroke-width="2" rx="8"/>
  <text x="36" y="184" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">3. String ISO 8601 — recomendado</text>
  <text x="36" y="206" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">const d = new Date('2025-06-15T10:30:00');</text>
  <text x="36" y="226" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">const d2 = new Date('2025-06-15');</text>
  <text x="36" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Sin Z → hora local; con Z → UTC</text>

  <!-- Form 4: year, month, day ... -->
  <rect x="415" y="162" width="365" height="95" fill="#1f2937" stroke="#ed8936" stroke-width="2" rx="8"/>
  <text x="431" y="184" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fed7aa">4. Argumentos numéricos</text>
  <text x="431" y="206" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">new Date(year, monthIndex, day,</text>
  <text x="431" y="224" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">         hours, minutes, seconds);</text>
  <text x="431" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  monthIndex = 0-11 (enero = 0)</text>

  <line x1="20" y1="276" x2="780" y2="276" stroke="#4a5568" stroke-width="1"/>

  <!-- Getters -->
  <text x="20" y="296" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Getters esenciales</text>

  <rect x="20" y="308" width="370" height="150" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="34" y="328" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const d = new Date('2025-06-15T10:30:00');</text>
  <text x="34" y="346" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getFullYear()   </text>
  <text x="176" y="346" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// 2025</text>
  <text x="34" y="364" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getMonth()      </text>
  <text x="176" y="364" font-family="Courier,monospace" font-size="11" fill="#fca5a5">// 5 ← junio (0-indexed)</text>
  <text x="34" y="382" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getDate()       </text>
  <text x="176" y="382" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// 15</text>
  <text x="34" y="400" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getHours()      </text>
  <text x="176" y="400" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// 10</text>
  <text x="34" y="418" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getDay()        </text>
  <text x="176" y="418" font-family="Courier,monospace" font-size="11" fill="#fca5a5">// 0=Dom … 6=Sáb</text>
  <text x="34" y="436" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.getTime()       </text>
  <text x="176" y="436" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// timestamp ms</text>
  <text x="34" y="454" font-family="Courier,monospace" font-size="11" fill="#93c5fd">d.toISOString()   </text>
  <text x="176" y="454" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// '2025-06-15T10:30Z'</text>

  <rect x="410" y="308" width="370" height="150" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="328" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Date.parse() y validación</text>
  <text x="424" y="348" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Parsear un string a timestamp</text>
  <text x="424" y="366" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const ms = Date.parse('2025-06-15');</text>
  <text x="424" y="384" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Validar que sea fecha válida</text>
  <text x="424" y="402" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const isValidDate = (d) =&gt;</text>
  <text x="424" y="420" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  d instanceof Date &amp;&amp; !isNaN(d);</text>
  <text x="424" y="440" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// new Date('not-a-date') → Invalid Date</text>
  <text x="424" y="458" font-family="Courier,monospace" font-size="11" fill="#fca5a5">isNaN(new Date('abc')) // true = inválido</text>

  <text x="400" y="476" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 21</text>
</svg>