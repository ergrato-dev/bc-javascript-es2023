<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Selección DOM: querySelector vs querySelectorAll</text>

  <!-- Left: querySelector -->
  <text x="190" y="64" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f0db4f" text-anchor="middle">querySelector — primer match</text>
  <rect x="20" y="74" width="360" height="200" fill="#1f2937" stroke="#f0db4f" stroke-width="2" rx="8"/>
  <text x="36" y="96" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Retorna un solo Element | null</text>
  <text x="36" y="114" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const btn = document.querySelector(</text>
  <text x="36" y="132" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  '#save-btn'</text>
  <text x="36" y="150" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">);</text>
  <text x="36" y="170" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const input = form.querySelector(</text>
  <text x="36" y="188" font-family="Courier,monospace" font-size="11" fill="#f0db4f">  '[data-field="name"]'</text>
  <text x="36" y="206" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">);</text>
  <text x="36" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Para elementos únicos</text>
  <text x="36" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ Scope en cualquier elemento padre</text>
  <text x="36" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  Devuelve null si no encuentra — verificar</text>

  <!-- Right: querySelectorAll -->
  <text x="610" y="64" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#4299e1" text-anchor="middle">querySelectorAll — todos los matches</text>
  <rect x="420" y="74" width="360" height="200" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="436" y="96" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Retorna NodeList (iterable)</text>
  <text x="436" y="114" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const cards = document.querySelectorAll(</text>
  <text x="436" y="132" font-family="Courier,monospace" font-size="11" fill="#93c5fd">  '.card'</text>
  <text x="436" y="150" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">);</text>
  <text x="436" y="170" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// NodeList → Array para métodos</text>
  <text x="436" y="188" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const arr = [...cards];</text>
  <text x="436" y="206" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">arr.forEach(card =&gt; card.classList</text>
  <text x="436" y="224" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  .add('visible'));</text>
  <text x="436" y="244" font-family="system-ui,sans-serif" font-size="11" fill="#86efac">✅ NodeList es iterable con forEach</text>
  <text x="436" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">⚠️  NodeList estático — reconsultar si DOM cambia</text>

  <line x1="30" y1="294" x2="770" y2="294" stroke="#4a5568" stroke-width="1"/>

  <!-- Selector types -->
  <text x="30" y="314" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Tipos de selector recomendados</text>

  <rect x="30" y="326" width="360" height="160" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="348" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#86efac">✅ Preferir datos semánticos</text>
  <text x="44" y="368" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// Por ID</text>
  <text x="44" y="386" font-family="Courier,monospace" font-size="11" fill="#f0db4f">querySelector('#modal')</text>
  <text x="44" y="406" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// Por data-attribute (no cambia con CSS)</text>
  <text x="44" y="424" font-family="Courier,monospace" font-size="11" fill="#f0db4f">querySelector('[data-action="delete"]')</text>
  <text x="44" y="444" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">// Scoped a contenedor</text>
  <text x="44" y="462" font-family="Courier,monospace" font-size="11" fill="#f0db4f">form.querySelector('[name="email"]')</text>
  <text x="44" y="480" font-family="Courier,monospace" font-size="11" fill="#86efac">// ← más robusto que document.querySelector</text>

  <rect x="410" y="326" width="360" height="160" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="348" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">❌ Evitar selectores frágiles</text>
  <text x="424" y="368" font-family="Courier,monospace" font-size="11" fill="#fca5a5">// Acoplado a estructura HTML</text>
  <text x="424" y="386" font-family="Courier,monospace" font-size="11" fill="#ef4444">querySelector('div &gt; ul &gt; li:first-child')</text>
  <text x="424" y="406" font-family="Courier,monospace" font-size="11" fill="#fca5a5">// Clase CSS usada para estilo</text>
  <text x="424" y="424" font-family="Courier,monospace" font-size="11" fill="#ef4444">querySelector('.btn-primary-large')</text>
  <text x="424" y="444" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Si cambia el CSS, el selector falla.</text>
  <text x="424" y="464" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Separar: clases para estilos,</text>
  <text x="424" y="482" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">data-* para lógica JavaScript.</text>

  <text x="400" y="514" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 17</text>
</svg>