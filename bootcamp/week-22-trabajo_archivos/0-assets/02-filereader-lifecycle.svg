<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470">
  <rect width="800" height="470" fill="#1a202c"/>
  <text x="400" y="30" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f0db4f" text-anchor="middle">FileReader: Ciclo de Vida</text>
  <rect x="20" y="48" width="230" height="115" rx="6" fill="#2d3748"/>
  <text x="30" y="67" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#86efac">readyState</text>
  <rect x="28" y="75" width="214" height="80" rx="4" fill="#171e2e"/>
  <text x="36" y="93" font-family="Courier,monospace" font-size="10" fill="#f0db4f">0  EMPTY</text>
  <text x="120" y="93" font-family="Courier,monospace" font-size="10" fill="#94a3b8">No hay datos cargados</text>
  <text x="36" y="110" font-family="Courier,monospace" font-size="10" fill="#f0db4f">1  LOADING</text>
  <text x="120" y="110" font-family="Courier,monospace" font-size="10" fill="#94a3b8">Leyendo archivo</text>
  <text x="36" y="127" font-family="Courier,monospace" font-size="10" fill="#f0db4f">2  DONE</text>
  <text x="120" y="127" font-family="Courier,monospace" font-size="10" fill="#94a3b8">Lectura completada</text>
  <text x="36" y="148" font-family="Courier,monospace" font-size="10" fill="#64748b">reader.readyState === FileReader.DONE</text>
  <rect x="265" y="48" width="275" height="115" rx="6" fill="#2d3748"/>
  <text x="275" y="67" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#86efac">Metodos</text>
  <rect x="273" y="75" width="259" height="80" rx="4" fill="#171e2e"/>
  <text x="281" y="93" font-family="Courier,monospace" font-size="10" fill="#93c5fd">readAsText(file, enc)</text>
  <text x="420" y="93" font-family="Courier,monospace" font-size="10" fill="#94a3b8">texto UTF-8</text>
  <text x="281" y="109" font-family="Courier,monospace" font-size="10" fill="#93c5fd">readAsDataURL(file)</text>
  <text x="420" y="109" font-family="Courier,monospace" font-size="10" fill="#94a3b8">base64 data URI</text>
  <text x="281" y="125" font-family="Courier,monospace" font-size="10" fill="#93c5fd">readAsArrayBuffer(file)</text>
  <text x="420" y="125" font-family="Courier,monospace" font-size="10" fill="#94a3b8">buffer binario</text>
  <text x="281" y="141" font-family="Courier,monospace" font-size="10" fill="#fca5a5">abort()</text>
  <text x="420" y="141" font-family="Courier,monospace" font-size="10" fill="#94a3b8">cancela la lectura</text>
  <rect x="555" y="48" width="225" height="115" rx="6" fill="#2d3748"/>
  <text x="565" y="67" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#86efac">Eventos</text>
  <rect x="563" y="75" width="209" height="80" rx="4" fill="#171e2e"/>
  <text x="571" y="93" font-family="Courier,monospace" font-size="10" fill="#f0db4f">onload</text>
  <text x="635" y="93" font-family="Courier,monospace" font-size="10" fill="#94a3b8">lectura exitosa</text>
  <text x="571" y="109" font-family="Courier,monospace" font-size="10" fill="#f0db4f">onprogress</text>
  <text x="635" y="109" font-family="Courier,monospace" font-size="10" fill="#94a3b8">progreso parcial</text>
  <text x="571" y="125" font-family="Courier,monospace" font-size="10" fill="#f0db4f">onerror</text>
  <text x="635" y="125" font-family="Courier,monospace" font-size="10" fill="#94a3b8">fallo en lectura</text>
  <text x="571" y="141" font-family="Courier,monospace" font-size="10" fill="#f0db4f">onabort</text>
  <text x="635" y="141" font-family="Courier,monospace" font-size="10" fill="#94a3b8">cancelado</text>
  <rect x="60" y="185" width="155" height="44" rx="6" fill="#2d3748" stroke="#f0db4f" stroke-width="1.5"/>
  <text x="137" y="203" font-family="Courier,monospace" font-size="11" fill="#f0db4f" text-anchor="middle">new FileReader()</text>
  <text x="137" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">readyState: 0</text>
  <line x1="215" y1="207" x2="258" y2="207" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="260" y="185" width="155" height="44" rx="6" fill="#2d3748" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="338" y="203" font-family="Courier,monospace" font-size="11" fill="#93c5fd" text-anchor="middle">readAsText(file)</text>
  <text x="338" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">readyState: 1</text>
  <line x1="415" y1="207" x2="458" y2="207" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="460" y="185" width="130" height="44" rx="6" fill="#2d3748" stroke="#86efac" stroke-width="1.5"/>
  <text x="525" y="203" font-family="Courier,monospace" font-size="11" fill="#86efac" text-anchor="middle">onload(e)</text>
  <text x="525" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">readyState: 2</text>
  <line x1="590" y1="207" x2="633" y2="207" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="635" y="185" width="145" height="44" rx="6" fill="#2d3748" stroke="#86efac" stroke-width="1.5"/>
  <text x="707" y="203" font-family="Courier,monospace" font-size="11" fill="#86efac" text-anchor="middle">e.target.result</text>
  <text x="707" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">contenido del archivo</text>
  <line x1="338" y1="229" x2="338" y2="258" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="260" y="260" width="155" height="34" rx="6" fill="#2d3748" stroke="#fed7aa" stroke-width="1"/>
  <text x="338" y="278" font-family="Courier,monospace" font-size="10" fill="#fed7aa" text-anchor="middle">onprogress(e)</text>
  <text x="338" y="288" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">e.loaded / e.total</text>
  <line x1="525" y1="229" x2="525" y2="258" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <rect x="460" y="260" width="130" height="34" rx="6" fill="#2d3748" stroke="#fca5a5" stroke-width="1"/>
  <text x="525" y="278" font-family="Courier,monospace" font-size="10" fill="#fca5a5" text-anchor="middle">onerror(e)</text>
  <text x="525" y="288" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">reader.error.message</text>
  <rect x="20" y="315" width="760" height="130" rx="6" fill="#2d3748"/>
  <text x="30" y="334" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#86efac">Patron recomendado: Promise wrapper</text>
  <rect x="28" y="341" width="744" height="96" rx="4" fill="#171e2e"/>
  <text x="36" y="358" font-family="Courier,monospace" font-size="10" fill="#94a3b8">const readFileAsText = (file) =&gt; new Promise((resolve, reject) =&gt; {</text>
  <text x="36" y="374" font-family="Courier,monospace" font-size="10" fill="#e2e8f0">  const reader = new FileReader();</text>
  <text x="36" y="390" font-family="Courier,monospace" font-size="10" fill="#86efac">  reader.onload = (e) =&gt; resolve(e.target.result);</text>
  <text x="36" y="406" font-family="Courier,monospace" font-size="10" fill="#fca5a5">  reader.onerror = () =&gt; reject(new Error("Error al leer archivo", { cause: reader.error }));</text>
  <text x="36" y="422" font-family="Courier,monospace" font-size="10" fill="#f0db4f">  reader.readAsText(file);</text>
  <text x="36" y="432" font-family="Courier,monospace" font-size="10" fill="#e2e8f0">});</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
