<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Práctica 04 - Drag & Drop</title>
  <style>
    #dropZone {
      width: 400px;
      height: 200px;
      border: 3px dashed #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #555;
      transition: background 0.2s, border-color 0.2s;
    }

    #dropZone.drag-active {
      background: #e8f4ff;
      border-color: #4299e1;
      color: #2b6cb0;
    }
  </style>
</head>

<body>
  <h1>Práctica 04: Drag and Drop</h1>
  <div id="dropZone">Arrastra archivos aquí</div>
  <ul id="fileList"></ul>

  <script src="starter/index.js"></script>
</body>

</html>
