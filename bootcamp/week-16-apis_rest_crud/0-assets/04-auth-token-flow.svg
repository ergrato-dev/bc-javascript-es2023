<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Autenticación con Token: flujo Bearer + headers</text>

  <!-- Flow diagram -->
  <!-- Client -->
  <rect x="30" y="60" width="120" height="60" fill="#2d3748" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="90" y="86" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">Cliente</text>
  <text x="90" y="106" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">(browser)</text>

  <!-- Arrow 1: login request -->
  <line x1="150" y1="90" x2="290" y2="90" stroke="#f0db4f" stroke-width="2"/>
  <polygon points="288,85 298,90 288,95" fill="#f0db4f"/>
  <text x="220" y="82" font-family="system-ui,sans-serif" font-size="10" fill="#f0db4f" text-anchor="middle">POST /auth/login</text>
  <text x="220" y="100" font-family="Courier,monospace" font-size="9" fill="#a0aec0" text-anchor="middle">{email, password}</text>

  <!-- Auth server -->
  <rect x="300" y="60" width="120" height="60" fill="#2d3748" stroke="#f0db4f" stroke-width="2" rx="8"/>
  <text x="360" y="86" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f" text-anchor="middle">Auth</text>
  <text x="360" y="106" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">server</text>

  <!-- Arrow 2: token returned -->
  <line x1="360" y1="120" x2="360" y2="170" stroke="#86efac" stroke-width="2"/>
  <polygon points="355,168 360,178 365,168" fill="#86efac"/>
  <text x="380" y="155" font-family="system-ui,sans-serif" font-size="10" fill="#86efac">{ token: "eyJ..." }</text>

  <rect x="300" y="180" width="120" height="44" fill="#065f46" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="360" y="203" font-family="Courier,monospace" font-size="11" fill="#86efac" text-anchor="middle">JWT token</text>
  <text x="360" y="218" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0" text-anchor="middle">guardado en storage</text>

  <!-- Arrow 3: authenticated request -->
  <line x1="420" y1="200" x2="580" y2="200" stroke="#93c5fd" stroke-width="2"/>
  <polygon points="578,195 588,200 578,205" fill="#93c5fd"/>
  <text x="500" y="190" font-family="system-ui,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">GET /api/items</text>
  <text x="500" y="210" font-family="Courier,monospace" font-size="9" fill="#fed7aa" text-anchor="middle">Authorization: Bearer eyJ...</text>

  <!-- API -->
  <rect x="590" y="176" width="120" height="60" fill="#2d3748" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="650" y="202" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#86efac" text-anchor="middle">API</text>
  <text x="650" y="222" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">protegida</text>

  <line x1="30" y1="256" x2="770" y2="256" stroke="#4a5568" stroke-width="1"/>

  <!-- Code sections -->
  <text x="30" y="276" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Implementación</text>

  <rect x="30" y="288" width="360" height="180" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="308" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Helper: añadir token a headers</text>
  <text x="44" y="326" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const authFetch = (url, opts = {}) =&gt; {</text>
  <text x="44" y="344" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const token =</text>
  <text x="44" y="362" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    localStorage.getItem('token');</text>
  <text x="44" y="380" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return fetch(url, {</text>
  <text x="44" y="398" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    ...opts,</text>
  <text x="44" y="416" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    headers: {</text>
  <text x="44" y="434" font-family="Courier,monospace" font-size="11" fill="#fed7aa">      Authorization: `Bearer ${token}`,</text>
  <text x="44" y="452" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">      ...opts.headers</text>
  <text x="44" y="470" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    }</text>
  <text x="44" y="488" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  });</text>
  <text x="44" y="496" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <rect x="410" y="288" width="360" height="180" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="308" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Manejar 401 (token expirado)</text>
  <text x="424" y="326" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const fetchWithAuth = async (url) =&gt; {</text>
  <text x="424" y="344" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const res = await authFetch(url);</text>
  <text x="424" y="362" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (res.status === 401) {</text>
  <text x="424" y="380" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    localStorage.removeItem('token');</text>
  <text x="424" y="398" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    location.href = '/login';</text>
  <text x="424" y="416" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    return;</text>
  <text x="424" y="434" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="424" y="452" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (!res.ok) throw new Error(res.status);</text>
  <text x="424" y="470" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return res.json();</text>
  <text x="424" y="488" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <text x="400" y="498" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 16</text>
</svg>