<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Estados de carga: idle → loading → success / error</text>

  <!-- State machine -->
  <!-- IDLE -->
  <rect x="30" y="56" width="140" height="70" fill="#2d3748" stroke="#718096" stroke-width="2" rx="10"/>
  <text x="100" y="84" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#a0aec0" text-anchor="middle">idle</text>
  <text x="100" y="104" font-family="system-ui,sans-serif" font-size="11" fill="#718096" text-anchor="middle">esperando</text>

  <line x1="170" y1="91" x2="236" y2="91" stroke="#4299e1" stroke-width="2"/>
  <polygon points="234,86 244,91 234,96" fill="#4299e1"/>
  <text x="200" y="84" font-family="system-ui,sans-serif" font-size="10" fill="#4299e1" text-anchor="middle">fetch()</text>

  <!-- LOADING -->
  <rect x="246" y="56" width="140" height="70" fill="#1e3a5f" stroke="#4299e1" stroke-width="2" rx="10"/>
  <text x="316" y="84" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#93c5fd" text-anchor="middle">loading</text>
  <text x="316" y="104" font-family="system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">en vuelo</text>

  <!-- loading → success -->
  <line x1="386" y1="72" x2="472" y2="52" stroke="#48bb78" stroke-width="2"/>
  <polygon points="468,47 478,52 470,59" fill="#48bb78"/>
  <text x="434" y="58" font-family="system-ui,sans-serif" font-size="10" fill="#48bb78">res.ok</text>

  <!-- loading → error -->
  <line x1="386" y1="110" x2="472" y2="130" stroke="#ef4444" stroke-width="2"/>
  <polygon points="468,125 478,130 470,138" fill="#ef4444"/>
  <text x="434" y="132" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444">!res.ok / throw</text>

  <!-- SUCCESS -->
  <rect x="482" y="32" width="140" height="70" fill="#065f46" stroke="#48bb78" stroke-width="2" rx="10"/>
  <text x="552" y="60" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#86efac" text-anchor="middle">success</text>
  <text x="552" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">datos listos</text>

  <!-- ERROR -->
  <rect x="482" y="116" width="140" height="70" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="10"/>
  <text x="552" y="144" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fca5a5" text-anchor="middle">error</text>
  <text x="552" y="164" font-family="system-ui,sans-serif" font-size="11" fill="#f87171" text-anchor="middle">mostrar mensaje</text>

  <!-- reset arrow -->
  <path d="M 622 67 Q 720 67 720 210 Q 720 240 652 240" stroke="#4a5568" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="648,235 658,240 648,245" fill="#4a5568"/>
  <text x="730" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#718096">reset</text>

  <line x1="30" y1="202" x2="770" y2="202" stroke="#4a5568" stroke-width="1"/>

  <text x="30" y="224" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Implementación: setState unificado</text>

  <rect x="30" y="236" width="360" height="228" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="256" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Referencias DOM centralizadas</text>
  <text x="44" y="274" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const UI = {</text>
  <text x="44" y="292" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  btn: document.querySelector('#btn'),</text>
  <text x="44" y="310" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  msg: document.querySelector('#msg'),</text>
  <text x="44" y="328" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  list: document.querySelector('#list')</text>
  <text x="44" y="346" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="44" y="366" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const setState = (state, msg = '') =&gt; {</text>
  <text x="44" y="384" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  UI.btn.disabled = state === 'loading';</text>
  <text x="44" y="402" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  UI.msg.textContent = msg;</text>
  <text x="44" y="420" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  UI.msg.className = `status ${state}`;</text>
  <text x="44" y="438" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="44" y="458" font-family="Courier,monospace" font-size="11" fill="#86efac">// setState('loading', 'Cargando...')</text>
  <text x="44" y="474" font-family="Courier,monospace" font-size="11" fill="#86efac">// setState('error', 'Red failure')</text>

  <rect x="410" y="236" width="360" height="228" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="256" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// fetch con ciclo completo de estados</text>
  <text x="424" y="274" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const loadData = async () =&gt; {</text>
  <text x="424" y="292" font-family="Courier,monospace" font-size="11" fill="#93c5fd">  setState('loading', 'Cargando...');</text>
  <text x="424" y="310" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  try {</text>
  <text x="424" y="328" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const res = await fetch('/api/items');</text>
  <text x="424" y="346" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    if (!res.ok)</text>
  <text x="424" y="364" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">      throw new Error(`${res.status}`);</text>
  <text x="424" y="382" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const data = await res.json();</text>
  <text x="424" y="400" font-family="Courier,monospace" font-size="11" fill="#86efac">    setState('success', 'Datos listos');</text>
  <text x="424" y="418" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    renderList(data);</text>
  <text x="424" y="436" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  } catch (err) {</text>
  <text x="424" y="454" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    setState('error', err.message);</text>
  <text x="424" y="472" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="424" y="490" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <text x="400" y="498" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 16</text>
</svg>