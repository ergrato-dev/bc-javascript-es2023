<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Flujo didáctico de petición HTTP</title>
  <desc id="desc">Secuencia pedagógica para implementar operaciones CRUD con puntos de decisión, validación y manejo de errores.</desc>
  <rect width="1200" height="680" fill="#101010"/>

  <text x="38" y="56" fill="#F0DB4F" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Flujo completo de una operación CRUD</text>
  <text x="38" y="86" fill="#D6D6D6" font-size="16" font-family="Inter, Roboto, sans-serif">Meta pedagógica: traducir una acción de UI en una petición REST correcta y trazable.</text>

  <rect x="40" y="118" width="190" height="90" rx="12" fill="#1B1B1B" stroke="#F0DB4F" stroke-width="2"/>
  <text x="62" y="150" fill="#F0DB4F" font-size="17" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso 1</text>
  <text x="62" y="178" fill="#F8F8F8" font-size="18" font-family="Inter, Roboto, sans-serif">Acción de UI</text>

  <rect x="260" y="118" width="220" height="90" rx="12" fill="#1B1B1B" stroke="#F0DB4F" stroke-width="2"/>
  <text x="282" y="150" fill="#F0DB4F" font-size="17" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso 2</text>
  <text x="282" y="178" fill="#F8F8F8" font-size="18" font-family="Inter, Roboto, sans-serif">Elegir método HTTP</text>

  <rect x="510" y="118" width="220" height="90" rx="12" fill="#1B1B1B" stroke="#F0DB4F" stroke-width="2"/>
  <text x="532" y="150" fill="#F0DB4F" font-size="17" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso 3</text>
  <text x="532" y="178" fill="#F8F8F8" font-size="18" font-family="Inter, Roboto, sans-serif">Construir request</text>

  <rect x="760" y="118" width="185" height="90" rx="12" fill="#1B1B1B" stroke="#F0DB4F" stroke-width="2"/>
  <text x="782" y="150" fill="#F0DB4F" font-size="17" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso 4</text>
  <text x="782" y="178" fill="#F8F8F8" font-size="18" font-family="Inter, Roboto, sans-serif">fetch()</text>

  <rect x="975" y="118" width="185" height="90" rx="12" fill="#1B1B1B" stroke="#F0DB4F" stroke-width="2"/>
  <text x="997" y="150" fill="#F0DB4F" font-size="17" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso 5</text>
  <text x="997" y="178" fill="#F8F8F8" font-size="18" font-family="Inter, Roboto, sans-serif">Procesar respuesta</text>

  <path d="M230 163 L260 163" stroke="#F0DB4F" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M480 163 L510 163" stroke="#F0DB4F" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 163 L760 163" stroke="#F0DB4F" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M945 163 L975 163" stroke="#F0DB4F" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="40" y="236" width="560" height="192" rx="14" fill="#181818" stroke="#4CAF50" stroke-width="2"/>
  <text x="60" y="268" fill="#4CAF50" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Decisión clave: ¿qué método usar?</text>
  <text x="60" y="300" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Si quiero listar o ver detalle → GET</text>
  <text x="60" y="326" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Si quiero crear recurso nuevo → POST</text>
  <text x="60" y="352" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Si quiero reemplazar todo el recurso → PUT</text>
  <text x="60" y="378" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Si solo cambio algunos campos → PATCH</text>
  <text x="60" y="404" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Si quiero eliminar un recurso → DELETE</text>

  <rect x="620" y="236" width="540" height="192" rx="14" fill="#181818" stroke="#E53935" stroke-width="2"/>
  <text x="640" y="268" fill="#E53935" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Checklist antes de enviar fetch</text>
  <text x="640" y="300" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">1. URL correcta: colección o /:id</text>
  <text x="640" y="326" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">2. Headers: Accept + Content-Type + Authorization</text>
  <text x="640" y="352" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">3. Body en JSON solo si aplica</text>
  <text x="640" y="378" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">4. Verificar response.ok y status</text>
  <text x="640" y="404" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">5. Actualizar estado UI: loading/success/error</text>

  <rect x="40" y="448" width="1120" height="192" rx="14" fill="#171717" stroke="#2F2F2F" stroke-width="2"/>
  <text x="60" y="480" fill="#F0DB4F" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Práctica guiada rápida</text>
  <text x="60" y="512" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Escenario: editar título de recurso #12. Decide método, endpoint, headers y payload.</text>
  <text x="60" y="538" fill="#F8F8F8" font-size="17" font-family="Inter, Roboto, sans-serif">Respuesta esperada: PATCH /items/12 con body parcial y validación de response.ok.</text>
  <text x="60" y="564" fill="#BDBDBD" font-size="15" font-family="Inter, Roboto, sans-serif">Discusión: si reemplazas todos los campos, ¿por qué PUT sería más semántico?</text>
  <text x="60" y="608" fill="#8A8A8A" font-size="14" font-family="Inter, Roboto, sans-serif">Usa este diagrama durante la práctica 03 para justificar cada decisión técnica.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F0DB4F"/>
    </marker>
  </defs>
</svg>
