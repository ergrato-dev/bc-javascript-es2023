<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">GET vs POST/PUT/PATCH: estructura de la petición</text>

  <!-- GET -->
  <text x="190" y="65" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#4299e1" text-anchor="middle">GET — sin body</text>
  <rect x="20" y="76" width="360" height="210" fill="#1f2937" stroke="#4299e1" stroke-width="2" rx="8"/>
  <text x="36" y="100" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Leer lista (parámetros en URL)</text>
  <text x="36" y="118" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const getItems = async () =&gt; {</text>
  <text x="36" y="136" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const res = await fetch(</text>
  <text x="36" y="154" font-family="Courier,monospace" font-size="11" fill="#93c5fd">    '/api/items?page=1&amp;limit=10'</text>
  <text x="36" y="172" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  );</text>
  <text x="36" y="190" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (!res.ok) throw new Error(res.status);</text>
  <text x="36" y="208" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return res.json();</text>
  <text x="36" y="226" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>
  <text x="36" y="255" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd">• Parámetros van en la URL (query string)</text>
  <text x="36" y="273" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd">• No tiene body — el servidor ignora body en GET</text>

  <!-- POST with body -->
  <text x="610" y="65" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#48bb78" text-anchor="middle">POST/PUT — con body JSON</text>
  <rect x="420" y="76" width="360" height="210" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="436" y="100" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Crear item (datos en body)</text>
  <text x="436" y="118" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const createItem = async (data) =&gt; {</text>
  <text x="436" y="136" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const res = await fetch('/api/items', {</text>
  <text x="436" y="154" font-family="Courier,monospace" font-size="11" fill="#86efac">    method: 'POST',</text>
  <text x="436" y="172" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    headers: {</text>
  <text x="436" y="190" font-family="Courier,monospace" font-size="11" fill="#fed7aa">      'Content-Type': 'application/json'</text>
  <text x="436" y="208" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    },</text>
  <text x="436" y="226" font-family="Courier,monospace" font-size="11" fill="#f0db4f">    body: JSON.stringify(data)</text>
  <text x="436" y="244" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  });</text>
  <text x="436" y="262" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  return res.json();</text>
  <text x="436" y="280" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <line x1="30" y1="308" x2="770" y2="308" stroke="#4a5568" stroke-width="1"/>

  <!-- PUT vs PATCH -->
  <text x="30" y="330" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#f0db4f">PUT vs PATCH: distinción importante</text>
  <rect x="30" y="342" width="360" height="120" fill="#1f2937" stroke="#ed8936" stroke-width="1.5" rx="6"/>
  <text x="46" y="362" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fed7aa">PUT — reemplaza el recurso completo</text>
  <text x="46" y="382" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">body: { name: 'nuevo', price: 10, stock: 5 }</text>
  <text x="46" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">Si omites un campo, se pierde en el servidor.</text>
  <text x="46" y="422" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fed7aa">PATCH — modifica solo los campos enviados</text>
  <text x="46" y="442" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">body: { price: 15 }   // solo price cambia</text>

  <!-- Error frecuente -->
  <rect x="410" y="342" width="360" height="120" fill="#1f2937" stroke="#ef4444" stroke-width="1.5" rx="6"/>
  <text x="426" y="362" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#ef4444">❌ Error frecuente en body</text>
  <text x="426" y="384" font-family="Courier,monospace" font-size="11" fill="#fca5a5">body: data          // objeto JS directo</text>
  <text x="426" y="402" font-family="system-ui,sans-serif" font-size="11" fill="#fca5a5">El server recibe "[object Object]" como string</text>
  <text x="426" y="424" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#48bb78">✅ Correcto</text>
  <text x="426" y="444" font-family="Courier,monospace" font-size="11" fill="#86efac">body: JSON.stringify(data)</text>

  <!-- Content-Type reminder -->
  <rect x="30" y="478" width="740" height="30" fill="#2d3748" rx="6"/>
  <text x="400" y="498" font-family="system-ui,sans-serif" font-size="12" fill="#f0db4f" text-anchor="middle">⚠️  Content-Type: application/json es obligatorio cuando envías body JSON — sin él el servidor no deserializa</text>

  <text x="400" y="516" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 16</text>
</svg>