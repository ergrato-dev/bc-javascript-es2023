<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#1a202c"/>
  <text x="400" y="34" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">Manejo de errores en fetch: patrones correctos</text>

  <!-- Wrong way -->
  <text x="190" y="64" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">❌ Patrón incorrecto</text>
  <rect x="20" y="74" width="360" height="180" fill="#1f2937" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="36" y="96" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// fetch SIN verificar res.ok</text>
  <text x="36" y="114" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const loadData = async () =&gt; {</text>
  <text x="36" y="132" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  try {</text>
  <text x="36" y="150" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    const res = await fetch('/api/items');</text>
  <text x="36" y="168" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    const data = await res.json();</text>
  <text x="36" y="186" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    render(data);</text>
  <text x="36" y="204" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  } catch (err) {</text>
  <text x="36" y="222" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    console.error(err);</text>
  <text x="36" y="240" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="36" y="246" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <!-- Correct way -->
  <text x="610" y="64" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#48bb78" text-anchor="middle">✅ Patrón correcto</text>
  <rect x="420" y="74" width="360" height="180" fill="#1f2937" stroke="#48bb78" stroke-width="2" rx="8"/>
  <text x="436" y="96" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Verificar res.ok ANTES de .json()</text>
  <text x="436" y="114" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const loadData = async () =&gt; {</text>
  <text x="436" y="132" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  try {</text>
  <text x="436" y="150" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const res = await fetch('/api/items');</text>
  <text x="436" y="168" font-family="Courier,monospace" font-size="11" fill="#86efac">    if (!res.ok)</text>
  <text x="436" y="186" font-family="Courier,monospace" font-size="11" fill="#86efac">      throw new Error(`${res.status}: ${res.statusText}`);</text>
  <text x="436" y="204" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    const data = await res.json();</text>
  <text x="436" y="222" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    render(data);</text>
  <text x="436" y="240" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  } catch (err) {</text>
  <text x="436" y="246" font-family="Courier,monospace" font-size="11" fill="#fca5a5">    showError(err.message);</text>
  <text x="436" y="256" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  }</text>
  <text x="436" y="264" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <line x1="30" y1="272" x2="770" y2="272" stroke="#4a5568" stroke-width="1"/>

  <!-- Error types matrix -->
  <text x="30" y="292" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Matriz de tipos de error HTTP</text>

  <!-- Header -->
  <rect x="30" y="304" width="740" height="26" fill="#2d3748" rx="4"/>
  <text x="90" y="321" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Código</text>
  <text x="200" y="321" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Causa</text>
  <text x="450" y="321" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Acción recomendada</text>

  <rect x="30" y="334" width="740" height="30" fill="#1f2937" rx="3"/>
  <rect x="52" y="340" width="60" height="18" fill="#1e3a5f" rx="3"/>
  <text x="82" y="353" font-family="Courier,monospace" font-size="11" fill="#93c5fd" text-anchor="middle">400</text>
  <text x="200" y="354" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Datos inválidos enviados</text>
  <text x="450" y="354" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">Validar inputs antes de enviar</text>

  <rect x="30" y="368" width="740" height="30" fill="#2d3748" rx="3"/>
  <rect x="52" y="374" width="60" height="18" fill="#450a0a" rx="3"/>
  <text x="82" y="387" font-family="Courier,monospace" font-size="11" fill="#fca5a5" text-anchor="middle">401</text>
  <text x="200" y="388" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">No autenticado / token vencido</text>
  <text x="450" y="388" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">Redirigir a login</text>

  <rect x="30" y="402" width="740" height="30" fill="#1f2937" rx="3"/>
  <rect x="52" y="408" width="60" height="18" fill="#450a0a" rx="3"/>
  <text x="82" y="421" font-family="Courier,monospace" font-size="11" fill="#fca5a5" text-anchor="middle">403</text>
  <text x="200" y="422" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Sin permisos para este recurso</text>
  <text x="450" y="422" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">Mostrar mensaje "acceso denegado"</text>

  <rect x="30" y="436" width="740" height="30" fill="#2d3748" rx="3"/>
  <rect x="52" y="442" width="60" height="18" fill="#451a03" rx="3"/>
  <text x="82" y="455" font-family="Courier,monospace" font-size="11" fill="#fed7aa" text-anchor="middle">404</text>
  <text x="200" y="456" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Recurso no existe</text>
  <text x="450" y="456" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">Mostrar "no encontrado"</text>

  <rect x="30" y="470" width="740" height="30" fill="#1f2937" rx="3"/>
  <rect x="52" y="476" width="60" height="18" fill="#450a0a" rx="3"/>
  <text x="82" y="489" font-family="Courier,monospace" font-size="11" fill="#fca5a5" text-anchor="middle">500</text>
  <text x="200" y="490" font-family="system-ui,sans-serif" font-size="12" fill="#e2e8f0">Error interno del servidor</text>
  <text x="450" y="490" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">Mostrar error genérico, loguear</text>

  <text x="400" y="514" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 16</text>
</svg>