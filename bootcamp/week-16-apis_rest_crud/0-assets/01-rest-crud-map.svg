<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540">
  <rect width="800" height="540" fill="#1a202c"/>
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#f0db4f" text-anchor="middle">CRUD → HTTP: Mapa de Operaciones REST</text>

  <!-- Header row -->
  <rect x="30" y="52" width="740" height="28" fill="#2d3748" rx="4"/>
  <text x="80" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Operación</text>
  <text x="210" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Método</text>
  <text x="340" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Endpoint</text>
  <text x="490" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Status</text>
  <text x="600" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Body resp.</text>

  <!-- CREATE -->
  <rect x="30" y="84" width="740" height="44" fill="#1f2937" rx="3"/>
  <text x="80" y="103" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#48bb78">Create</text>
  <rect x="202" y="90" width="80" height="20" fill="#065f46" rx="4"/>
  <text x="242" y="104" font-family="Courier,monospace" font-size="12" fill="#86efac" text-anchor="middle">POST</text>
  <text x="340" y="103" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">/items</text>
  <rect x="482" y="90" width="50" height="20" fill="#065f46" rx="4"/>
  <text x="507" y="104" font-family="Courier,monospace" font-size="12" fill="#86efac" text-anchor="middle">201</text>
  <text x="600" y="103" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">{ item creado }</text>
  <text x="80" y="119" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0">Crea un recurso nuevo en el servidor</text>

  <!-- READ ALL -->
  <rect x="30" y="132" width="740" height="44" fill="#2d3748" rx="3"/>
  <text x="80" y="151" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4299e1">Read All</text>
  <rect x="202" y="138" width="80" height="20" fill="#1e3a5f" rx="4"/>
  <text x="242" y="152" font-family="Courier,monospace" font-size="12" fill="#93c5fd" text-anchor="middle">GET</text>
  <text x="340" y="151" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">/items</text>
  <rect x="482" y="138" width="50" height="20" fill="#1e3a5f" rx="4"/>
  <text x="507" y="152" font-family="Courier,monospace" font-size="12" fill="#93c5fd" text-anchor="middle">200</text>
  <text x="600" y="151" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">[ array ]</text>
  <text x="80" y="167" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0">Lista todos los recursos disponibles</text>

  <!-- READ ONE -->
  <rect x="30" y="180" width="740" height="44" fill="#1f2937" rx="3"/>
  <text x="80" y="199" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4299e1">Read One</text>
  <rect x="202" y="186" width="80" height="20" fill="#1e3a5f" rx="4"/>
  <text x="242" y="200" font-family="Courier,monospace" font-size="12" fill="#93c5fd" text-anchor="middle">GET</text>
  <text x="340" y="199" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">/items/:id</text>
  <rect x="482" y="186" width="50" height="20" fill="#1e3a5f" rx="4"/>
  <text x="507" y="200" font-family="Courier,monospace" font-size="12" fill="#93c5fd" text-anchor="middle">200</text>
  <text x="600" y="199" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">{ un item }</text>
  <text x="80" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0">Obtiene recurso específico por su ID</text>

  <!-- UPDATE -->
  <rect x="30" y="228" width="740" height="44" fill="#2d3748" rx="3"/>
  <text x="80" y="247" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#ed8936">Update</text>
  <rect x="202" y="234" width="80" height="20" fill="#451a03" rx="4"/>
  <text x="242" y="248" font-family="Courier,monospace" font-size="11" fill="#fed7aa" text-anchor="middle">PUT/PATCH</text>
  <text x="340" y="247" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">/items/:id</text>
  <rect x="482" y="234" width="50" height="20" fill="#451a03" rx="4"/>
  <text x="507" y="248" font-family="Courier,monospace" font-size="12" fill="#fed7aa" text-anchor="middle">200</text>
  <text x="600" y="247" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">{ actualizado }</text>
  <text x="80" y="263" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0">PUT reemplaza todo · PATCH actualiza solo campos enviados</text>

  <!-- DELETE -->
  <rect x="30" y="276" width="740" height="44" fill="#1f2937" rx="3"/>
  <text x="80" y="295" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#ef4444">Delete</text>
  <rect x="202" y="282" width="80" height="20" fill="#450a0a" rx="4"/>
  <text x="242" y="296" font-family="Courier,monospace" font-size="12" fill="#fca5a5" text-anchor="middle">DELETE</text>
  <text x="340" y="295" font-family="Courier,monospace" font-size="12" fill="#e2e8f0">/items/:id</text>
  <rect x="482" y="282" width="50" height="20" fill="#450a0a" rx="4"/>
  <text x="507" y="296" font-family="Courier,monospace" font-size="12" fill="#fca5a5" text-anchor="middle">204</text>
  <text x="600" y="295" font-family="system-ui,sans-serif" font-size="12" fill="#a0aec0">(sin body)</text>
  <text x="80" y="311" font-family="system-ui,sans-serif" font-size="10" fill="#a0aec0">204 = operación exitosa sin contenido de respuesta</text>

  <line x1="30" y1="336" x2="770" y2="336" stroke="#4a5568" stroke-width="1"/>

  <!-- Code side by side -->
  <text x="30" y="356" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#f0db4f">Ejemplo: DELETE + regla de nomenclatura</text>
  <rect x="30" y="366" width="360" height="144" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="44" y="386" font-family="Courier,monospace" font-size="11" fill="#a0aec0">// Eliminar item por id</text>
  <text x="44" y="403" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">const deleteItem = async (id) =&gt; {</text>
  <text x="44" y="420" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  const res = await fetch(</text>
  <text x="44" y="437" font-family="Courier,monospace" font-size="11" fill="#93c5fd">    `/api/items/${id}`,</text>
  <text x="44" y="454" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">    { method: 'DELETE' }</text>
  <text x="44" y="471" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  );</text>
  <text x="44" y="488" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">  if (!res.ok) throw new Error(res.status);</text>
  <text x="44" y="505" font-family="Courier,monospace" font-size="11" fill="#e2e8f0">};</text>

  <rect x="410" y="366" width="360" height="144" fill="#171e2e" rx="6" stroke="#4a5568" stroke-width="1"/>
  <text x="424" y="386" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#f0db4f">Regla: verbo en método, no en URL</text>
  <text x="424" y="410" font-family="Courier,monospace" font-size="11" fill="#ef4444">❌  /createItem</text>
  <text x="424" y="428" font-family="Courier,monospace" font-size="11" fill="#ef4444">❌  /deleteItem/5</text>
  <text x="424" y="448" font-family="Courier,monospace" font-size="11" fill="#48bb78">✅  POST /items</text>
  <text x="424" y="466" font-family="Courier,monospace" font-size="11" fill="#48bb78">✅  DELETE /items/5</text>
  <text x="424" y="488" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">Los recursos son sustantivos en plural.</text>
  <text x="424" y="505" font-family="system-ui,sans-serif" font-size="11" fill="#a0aec0">response.ok solo cubre 2xx — validar siempre</text>

  <text x="400" y="534" font-family="system-ui,sans-serif" font-size="10" fill="#4a5568" text-anchor="middle">Bootcamp JavaScript ES2023 — Semana 16</text>
</svg>